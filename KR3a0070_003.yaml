front:
  text: 欽定四庫全書朱子讀書法卷三宋張洪齊􅮷同編
  hash: sha256:3ceeb5ca8318930e1b04987a0f7110627af7c2a4ef22abb5cff9abc5f7f890b4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0070_WYG_003-1a, image: WYG0709/WYG0709-0387a.png}
body:
  text: 綱領人之為學固是欲得之於心體之於身但不讀書則不知心之所得者何事學不是讀書然不讀書又不知所以為學之道聖賢教人只是要誠意正心修身齊家治國平天下所謂學者學此而已讀書是講學中一事又曰讀書是格物一事本心陷溺之久義理浸灌未透且宜讀書窮理常不間斷則物欲之心自不能勝而本心之義理自安且固矣先生語黃義剛曰讀書窮理便是為學其他也無陶鑄處又曰只杜門讀書便是所向别也無所向只是就書上子細玩味考究義理便是不讀書不窮理則心無所用遂生出病讀書理㑹一件又一件書不可只就皮膚上看天下無書不是合讀底若一箇書不讀這裏便闕此一書之理去聖既逺天下無師學者必因書記語言以知理義之精微知之固道也不然則為溺心志之大穽矣先生答陳眀仲書曰上古未有文字之時學者固無書可讀而中人以上固有不待讀書而自得者但自聖賢有作則道之載於經者詳矣雖孔子之聖不能離是以為學也答吕子約書曰夫學者既學聖人則當以聖人之教為主今六經語孟中庸大學之書具在彼以了悟為髙者既病其障礙而以為不可讀此以記覽為重者又病其狹小而以為不足觀如是則是聖人所以立言垂訓者徒足以誤人而不足以開人孔子不賢於堯舜而逹摩賢於仲尼矣無乃悖之甚耶答劉定夫書曰學者息却許多狂妄身心除却許多間雜說話著實讀書初時儘且尋行數墨久之自有見處最怕人說學不在書不務占畢不専口耳下梢說得張皇都無收拾只是一場脫空真是可惡先生記建陽藏書閣有曰古之聖人作為六經以教後世易以道幽明之故書以紀政事之實詩以導情性之正春秋以示法戒之嚴禮以正行樂以和心其於義理之精微古今之得失所以該貫發揮究備窮極可謂盛矣而總其書不過數十卷蓋其簡易精約又如此自漢以來儒者相與遵守而誦習之轉相授受各有家法然後訓𫝊之書始出至於有國家者厯年行事之迹又皆各有史官之記於是文字之𫝊益廣若乃世之賢人君子學經以探聖人之心考史以驗時事之變以至見聞感觸有接於外而動乎中則又或頗論著其說以成一家之言而簡册所載篋櫝所藏始不勝其多矣然學者不欲求道則已誠欲求之是豈可以舍此而不觀也哉而近世以來乃有所謂科舉之業者以奪其志士子相從於學校庠孰之間無一日不讀書然問其所讀則舉非向之所謂者嗚呼讀聖賢之言而不通於心不有於身猶不免於書肆况其所讀又非聖賢之書哉以此道人乃欲望其教化行而風俗美其亦難矣先生記經史閣有曰古之學者無他眀德新民求各止於至善而已夫其所眀之德所止之善豈有待於外求哉識其在我而敬以存之其亦可矣其所以必曰讀書云者則以天地隂陽事物之理修身事親齊家及國以至於平治天下之道與凡聖賢之言行古今之得失禮樂之名數下而至於食貨源流兵刑之法制亦莫非吾之度內有不可得而精粗者若非考諸載籍之文沉潛參伍以求其故則亦無以眀夫眀德體用之全而止其至善精微之極也然自聖學不𫝊世之為士者不知學之有本而惟書之讀則其所以求於書不越乎記誦訓詁文詞之間以釣聲名干利祿而已是以天下之書愈多而理愈昧學者之事愈勤而心愈放詞學愈麗議論愈髙而其德業事功之實愈無以逮乎古人然非書之罪也讀者不知學之有本而無以為之地也使二三子者知夫為學之本有無待於外求者而因以致其操存持守之力使吾方寸之間清明純一真有以為讀書之地而後宏其規密其度循其先後本末之序以大玩乎閣中之藏則夫天下之理必有以盡其纎悉而一以貫之異時所以措諸事業者亦將有本而無窮矣先生作論語訓䝉後更名集注序曰夫其訓釋之詳且眀也日講焉則無不通矣義理之精且約也日誦焉則無不識矣通者已知而時習識者未解而勿忘余之始學亦若斯而已矣嗚呼小子其懋敬之哉汲汲焉而毋欲速也循循焉而毋欲惰也毋牽於俗學而絶之以為迂且誕也毋惑於異端而躐之以為近且卑也聖人之書大中至正之極而萬世之標凖也古之學者其始即以此為學其卒非離此以為道窮理盡性修身齊家雖以及人內外一致蓋取諸此而無所不偹亦修吾身而已矣舍是而他求夫豈無可觀者然致逺恐泥昔者吾幾陷焉今裁自脫故不願汝曹之為之也嗚呼小子其懋戒之哉先生答劉仲則書曰舍去書冊不復以講學問辨為事則恐所以持身接物之際未有皆能識其本原而中於幾㑹此子路何必讀書之論所以見惡於聖人也答包詳道書曰今謂聖門之學全然不須講學才讀書窮理便為障蔽則無是理顔子一問為邦夫子便告以四代之禮樂若平時都不講學如何曉得禮記有曾子問一萹於禮文之變纎悉曲盡豈是塊然都不講學耶東坡作蓮華漏銘譏衛朴以己之無目而欲廢天下之視來諭無乃類此乎答項平父書曰聖賢教人雖以恭敬持守為先而於其中又必使之即事即物考古驗今體㑹推尋內外𠫭合蓋必如此然後見得此心之真此理之正而於世間萬事一切言語無不洞然了其白黑也答顔子堅書曰辱書備見雅志然所謂古人學問不在簡編必有所謂統之宗㑹之元者則僕之愚於此有未喻也聖人教人博文約禮學問思辨而力行之自灑掃應對章句誦說以至於精義入神酬酢萬變其序不可誣也若曰學以躬行心得為貴而不在於簡編則可若曰不在簡編而惟統宗㑹元之求則是妄意躐等以陷於邪說陂行之流而非聖賢所𫝊之正矣循序漸進序有二其說見前集問初學當讀何書曰六經論孟皆聖賢遺書皆當讀但初學須知緩急大學語孟是聖人為人切要處惟大學一書說古人為學大方玩味此書却讀論語學須以大學為先次論語次孟子次中庸中庸工夫密規模大論孟中庸待大學通貫浹洽無可得看後方看乃佳先看大學次語孟次中庸果然下工夫句句字字涵泳切己看得透徹一生受用不盡人自有合讀底書如大學語孟中庸等書豈可不讀讀此四書然後看詩書禮樂上古之書莫尊於易中古後書莫大於春秋然此兩書皆未易看先生問剛中平時讀何書剛中說看語孟荀楊莊老王通諸書先生云須看語孟若荀楊乃誤人之書莊老乃壞人之書問看書以何為先曰先讀大學可見古今為學首末次第又曰致知格物是窮此理誠意正心修身是體此理齊家治國平天下是推此理要做三節看大學是聖門最初用工處格物又是大學最初用工處致知一章此是大學最初下手處若理㑹得透徹後面便容易先讀大學可見古人為學首末次第且就實處理㑹却好不消得専去無形無影處理㑹讀書之序須是且著力去看大學又著力去看論語又著力去看孟子看得三書了這中庸半截都了不用問人只略略恁看過不可掉了易底却先去攻那難底中庸多說無形影如鬼神如天地參等類說得髙說下學處少說上逹處多若且理㑹文義則可矣易難看不若且看大學中庸語孟詩書較好商量易書自是難看須經理世故多識盡人情物理方看得入蓋此書平淡所說之事皆是見今所未嘗有者學者須先讀詩書他經有箇見處及曾經厯事方可以讀易得其無味之味此初學者所以未可便看如論語所載皆是事親取友居鄊黨目下便用得者所言皆對著學者即今實事孟子每章先言大㫖了又自下注腳大學則前面三句總盡致知格物而下一段綱目欲眀眀德以下一假又總括了𫝊中許多事一如鎖子骨才提起便總說得來所以教學者且看此二三書若易𫝊則卒乍裏面無提起處蓋其間義理闊多易𫝊先須讀他書理㑹得義理了方有箇入路見其精密處蓋其所言義理極妙初學者未曾使著不識其味都無唘發如遺書之類人看著却有啓發處非是易𫝊不好是不合使未當看者看須是已知義理者得此便可磨礲入細此書於學者非是啓發工夫乃磨礲工夫先生與陳丞相書曰易書難讀今之說者多是不得聖人本來作經立言之意而緣文生義便說道理故雖說得行而揆以人情終無意味頃嘗極意研索僅得一二而所未曉者尚多竊意莫若且讀詩書論孟之屬言近指逺而切於學者日用工夫也先生答江德功書曰若要讀書且讀論孟詩書之屬就平易明白有事迹可按據處看取道理體面涵養德性今人耳學都不將心究索大抵諸經文字有古今之殊又有𫝊注障礙若非理明義精卒難决擇不如且讀大學論孟中庸平易明白而意自深逺只要人玩味尋繹目下便可踐履也答符復仲書曰易書明白而精深易讀而難曉須兼論孟及詩書明白處讀之乃有味耳答方賔玉書曰易之一書最不易讀而今人喜言之正所謂畫鬼神者殊不知只是瞞得不㑹底於自己分上成得何事而世人自有曉得者亦不可得而欺也答陳眀仲書曰經書難讀而易書為尤難蓋未開卷時已有一重象數大概工夫開卷之後經文本意又多被先儒硬說殺了今人看得意思局促不見本來開物成務活法讀禮記復讀儀禮儀禮是經禮記是解如儀禮有冠禮禮記便有冠義儀禮有昏禮禮記便有昏義其他皆然讀書須是先以經為本而後讀史先生答吕伯恭書曰示喻今學者兼看經史甚善此間學者少通敏之資只看得一經或論孟已無餘力矣然恐亦當令多就經中留意為佳蓋史書閙熱經書冷淡後生心志未定少有不偏向外去者亦當預防也又曰為學之序為己而後可以及人通理然後可以制事故程夫子教人先讀論孟次及諸經然後看史其序不可亂若恐其徒務空言但當就論孟經書中教以躬行之意庶不相逺通鑑難看不如看史記漢書史記漢書事多貫穿通鑑是逐年事逐年過了更無蹤跡某舊讀通鑑且草看正史一上却來看他答潘叔昌書曰看史但欲通知古今之變又以觀其所處理義之得失耳讀通鑑且將全本熟看却去看綱目發明却儘好議論也先看語孟中庸更看一經却看史方易看先看史記史記與左𫝊相包次看左𫝊次看通鑑有餘力則看全史人要㑹作文章須讀取一部西漢文與韓文歐陽文南豐文先生答程允夫書曰三百萹性情之本離騷詞賦之宗學詩而不知以此是亦淺矣後山詩固佳然前輩以為盡力規模已少變化其論甚當然學者所急亦不在此學者之要求諸己而已求諸己别無要妙語孟二書精之􅌻之求所以見聖賢用意處被服而力持之可也文字工拙尚何足道又書曰某聞之先師病翁及諸丈人先生皆謂作詩須從陶栁門庭中來乃佳耳蓋不如是不足以發蕭散冲淡之趣不免於局促塵埃無由到古人佳處也如選詩及韋蘇州詩亦不可不熟觀近世詩人如陳簡齊絶佳張巨山逾冲淡但世不甚喜耳更須熟觀語孟以探其夲已上三假非讀書本務亦聖門游於藝之意云耳右羣書先後緩急之序觀書不可貪多常使自家力量有餘須看得一書徹了方再看一書若雜然並進却反為所困如射弓有五㪷力且用五㪷弓便可拽滿己力欺得他過今學者不忖自己力量去觀書恐自家照管他不過讀書須看一句後又看一句讀一章後又讀一章格物須格一物見這箇物事道理道理既多則難底道理自然識得大學且逐章理㑹先讀本文念得次將章句來解本文又將或問來參章句既逐假曉得却將來統看溫尋過論讀書之法擇之云嘗作課程看論語日不得過一假先生云眀者可讀兩假或三假如此亦可以治躁心先生問看論語了未輔廣云已看一遍先生曰太快若如此看只是理㑹文義不見得他深長底意味先生問胡某論語讀得多少對曰兩日只雜看中庸等先生曰恁地如何㑹長進看此一書且須専一書讀大學且逐假捱看看這假時似無得後面底看第二假却思量前假令文思聮屬却不妨每日看一經外大學語孟中庸四書自依次序循環看然史亦不可不看論語從學而時習讀起孟子從梁惠王讀起大學從大學之道讀起中庸從天命之謂性讀起某之法是如此不可只擇中間一兩句來理㑹意脉不相貫屬多岐亡羊者不可不戒也又曰承諭専看論語浸覺滯固因復看易傳及繫辭此愚意所未喻夫論語所記皆聖人言行之要果能専意玩索其味無窮豈有滯固之理竊恐是不曾専一故不見其味而反以為滯固耳至於讀易亦當遵用程子之言卦爻繫辭自有先後今亦何所迫切而手忙腳亂亦至於此耶又曰授學須小作課程責其精熟若只似目前大餐長啜貪多務速即不濟事答黃子耕書曰示諭且看大學俟見大指乃及他書此意甚善但看時須是更將大假分作小假字字句句不可容易放過常時暗誦默思反覆研究未上口時須教上口未通透時須教通透已通透後便要純􅌻直是不思索時此意常在心胸之間驅遣不去方是此一假了又换一假看如此數假之後心安理􅌻覺得工夫省力時便漸得力也近看得朋友間病痛多是貪多務廣匆遽涉躐所以凡事草率粗淺本欲多知多能下梢一字不知一事不能本欲速成反成虛度嵗月但能反此如前所云試用嵗月之功當自見其益矣答胡季隨書曰近日學者意思都不確實不曾見理㑹得一書一事徹頭徹尾東邉綽得幾句西邉綽得幾句都不曾貫穿浹洽此是大病有志之士不可不深戒也答王季和書曰讀書不可貪多今當且以大學為先逐假􅌻讀精思須令了了分明方可改讀後假如此庶幾見功久久浹洽通貫則無書不可讀矣答郭希吕書曰専看大學首尾通貫都無所疑然後可讀語孟語孟又無所疑然後可讀中庸今大學全未曉了而便兼看中庸用心叢雜如此何由見得詳細且更耐煩専一細看為佳日月不易得大事未明甚可懼也答劉仲則書曰大抵讀書惟循序漸進為可得之如百牢九鼎非可一嘬而盡其味也答邵叔義書曰竊意必欲實為此學亦當有以自致其力於日用之間讀書窮理積其精誠循序漸進然後可得决非一旦慨然永歎而躐等坐馳之所能到也答陳師德書曰讀書之法要當循序而有常致一而不懈從容乎句讀文義之間而體驗乎操存踐履之實然後心靜理明漸見意味不然則雖廣求博取日誦五車亦奚益於學哉故程子曰善學者求言必自近始易於近者非知言者也此言殊有味惟困於逺求而無得者知之答鄭子上書曰看大學須先緊著精神領略取大體規模却便回來尋箇實下手處著緊用力不可只守著此箇行程節次認作到頭處也答潘叔昌書曰大抵近世儒者於聖賢之言未嘗求其義理之極致而惟以多求劇讀為功故往往遂以吾學為容易之空言而求所以進實功除實病者皆必求之於彼殊不知將適千里而迷於所向吾恐其進步之日逺而稅駕之日賒也今若未能决意自拔得且姑置其說而専意於吾學捐去雜博専讀一書虛心游意以求夫義理之所在如此三年不得而後改圖則朋友之心無所復恨而於其所以進功除病之實亦未為晚答廖子晦書曰觀書須從頭循序而進不以淺深難易有所取舍自然意味詳密至於浹洽貫通則無緊要處所下工夫亦不落空矣今人多是揀擇難底好底看非惟聖賢之言不可如此間别且是心意便不定疊縱然用心探索得到亦與自家這裏不相干突兀聱牙無田地可安頓此病不可不知也答袁機仲書曰易中卦位義理層數甚多自有次第逐層各是一箇體面不可牽强合為一說學者須是旋次理㑹理㑹上層之時未要攪動下層直待理㑹得上層都透徹了又却輕輕揭起下層理㑹將去當時雖似遲鈍不快人意然積纍之久層層都了却自見得許多條理千差萬别各有歸著豈不快哉若不問淺深不分前後混成一塊合成一說則彼此相妨令人分疏不下徒自紛紛成鹵莽矣此是平生讀書已試之效不但讀易為然也答王欽之書曰取一書從頭逐假子細理㑹久之必自有疑有得若平時泛泛都不著實循序讀書未說義理不精且是心緒支離無箇主宰處與義理自不相親又無積纍工夫參伍考照案文集照作證驟然理㑹一件兩件若是小小題目則不足留心擇其大者又有躐等之弊終無浹洽之功但以論語為先一日只看一二假莫問精粗難易只從頭看將去讀而未曉則思思而未曉則讀反覆玩味久之必有自得近年為朋友商量亦多以此告之然未見有看得徹尾者人情喜新厭常乃如此甚可歎論語二十篇尚不耐煩看得了况所謂死而後已者又豈能辦此長逺工夫耶答林正卿書曰讀書之法須從頭至尾逐句玩味看上字時如不知有下字看上句時如不知有後句看得都通透了又却從頭看此一假令其首尾通貫然方其看此假時亦不知有後假也如此漸進庶幾心與理㑹自然浹洽非惟㑹得聖賢言語意脉不差且是自己分上身心義理日見純􅌻若只如此匆匆檢閲一過便可隨意穿鑿排布硬說則不惟錯㑹了經意於己分上亦有何干涉耶答汪叔耕書曰所論為學次第足見立志之髙然雜然進之而不由其序譬如以枵然之腹入酒食之肆見其肥美大胾餅餌膾脯雜然於前遂欲左拏右攫盡納於口快嚼而亟吞之豈不撑腸拄腹而果然一飽哉然未嘗一知其味則不知向之所食者果何物也答朱朋孫書曰夫學非讀書之謂然不讀書又無以知為學之方故讀之者貴専而不貴博蓋惟専為能知其意而得其用徒博則反苦於雜亂淺略而無所得也今一旦而讀八書則茫然而不得其要也豈足怪哉願且致精一書優柔厭飫以求聖學工夫次第之實俟其心通意解書册之外别有實下工夫處然後更易而少進焉則得尺得寸雖少而皆為吾有矣讀論語每日只兩假􅌻了自然見義理貫通若不如此看是幾年也無長進大凡讀書不要般涉但溫尋舊底不妨不可將新底來搶大學一日只看二三假時便有許多修改若一向看去便少不是少只是看得草草讀論語且􅌻讀學而一萹若明得一萹其餘自然易曉先生答程正思曰論語逐章細看每日不過兩三假先令盡通諸說異同然後探求聖言本意則久之自當見效答宋容之書曰文字擇其尤精而最急者且看一書一日隨力且看一兩假候一假已曉方换一假一書皆畢方换一書先要虛心平氣􅌻讀精思令一字一語皆有下落諸家注解一一貫通然後可以較其是非以求聖賢立言之本意雖已得之亦且更如此反覆玩味令其義理浹洽於中淪肌浹髓然後乃可言學耳論語一日只看一假大致明白底則看兩假須是専一自早至夜雖不讀亦當涵泳常在胸次如有一件事未了相似到晚却把來商量但一日積一假日日如此年嵗間自是裏面通貫道理分明嘗謂今人讀書得如漢儒亦好漢儒各専一家看得極子細今人才看這一件又要看那一件下梢都不曽理㑹得今人讀書看未到這裏心已在後面才看到這裏便欲捨去了如此只是不求自家曉解須是徘徊顧戀如不欲去方㑹認得若能沉潛専一看得文字只此便是治心飬性之法先生語楊道夫曰看來用心専一讀書子細則自然㑹長進病痛自然消除先生問叔器論語讀多少對曰兩日只雜看曰恁地如何㑹長進看此一書且須専此一書便得此邉冷如氷那邉熱如火亦不可捨此而觀彼先生答湯退思書曰知讀書有漸甚善甚善但亦須且讀一書先其近而易知者字字考驗句句推詳上句了然後及下句前假了然後及後假乃能真實該遍無所不通使自家意思便與古聖賢意思泯然無間不見古今彼此之隔乃為真讀書耳答孫仁甫書曰讀書一事可為攝伏身心之助然不循序而致謹焉則亦未有益也今為賢者計且當就日用間致其下學之功讀書窮理則細立課程耐煩著實而勿求速解操存持守則隨時隨處省覺收斂而毋計近功如此積纍做得三五年工夫庶幾心意漸馴根本粗立而有所據之地不然恐終為氣所使而不得有所就也答陳謨書曰為學乃終身事業非可索於咄嗟指顧之間但當循序講明著實持守不令日用之間少有間斷如是久久當自得之不當較計功程如商子本者之營營也右每書誦讀考索之序􅌻讀精思先生答沈叔晦書曰務為學而不觀書此固一偏之論然中年精力有限與其泛觀而博取不若􅌻讀而精思得尺吾尺得寸吾寸始為不枉用工耳為學之道更無他法但能􅌻讀精思久之自有見處尊所聞行所知久之自有至處􅌻讀精思既曉得又須疑不止如此庶幾有進若以為止如此矣則終不復有進也論語首章便是讀書玩理之樣轍更無别塗請只如此用功不必切切論功計獲也答林伯和書曰講學莫先於語孟而讀語孟者又須逐章􅌻讀精思不通然後考諸先儒之說以發明之如二程先生說得親切處直須看得爛􅌻與經文一般成誦在心乃可答余占之書曰讀書之法熟讀精思此外更無别巧答胡季隨書曰讀書不務精熟則久逺無入頭處必為浮說所動答路季章書曰將語孟正文端㘴熟讀口誦心惟雖已曉得文義亦須逐字忖過洗滌心肝五臟許多忿憾之氣管取後日須有進步處不但如今日而已又曰讀書須隨章逐句子細研窮方見義味若只用粗心但求快意恐無以蕩滌塵埃剗除鱗甲也答楊至之書曰熟讀一經子細理㑹有疑則思不通方問庶有進處若只如此泛泛揭過便容易生說雖說得是亦不濟事况全未有交涉乎答趙履常書曰讀書遺忘此亦士友之通患無藥可醫只有少讀深思令其意味浹洽當稍見功耳又答陳明仲亦同此答廖子晦書曰近時朋友謾說為學然讀書尚不能記得本文講說尚不能通得訓詁因循茍且一暴十寒日往月來漸次老大則遂漠然忘之更無頭緒可以接續良可歎也答許生書曰夫道之體用盈於天地之間古先聖人既深得之而慮後世不能以逹乎此於是立言垂教自本至末所以提撕誨誘於後人者無所不備學者正當熟讀其書精求其意考之吾心以求其實參之事物以驗其歸則日用之間諷誦思存應務接物無一事之不切於己矣答張元德書曰讀書切忌貪多惟少則易以精熟而學問得力處正在於此茍為不熟不如稊稗非虛語也讀書須是將夲文熟讀且嚼咀其味若有理㑹不得處然後將注解看方是有益讀書法且先讀數十過已得文義四五分然後看解又得二三分又却讀正文又得一二分讀書不貴多只貴熟今人讀書傷快須是熟讀方得孟子大致分曉也不用解但熟讀當時解詩時且讀本文四五十遍已得六七分却看諸人說與我意思如何大綱都得之又讀三四十遍如此則義理流通自得矣看詩須是諷詠教浹洽骨髓方得今都未曾看他皮毛在某已前是看了多少詩說今只有一本解了不勞討别解看省了多少事如何更不去熟讀須是先將那詩來吟詠四五十遍了方可看注看了又吟詠三四十遍便意思自然融液浹洽方有見處詩可以興須是反覆熟讀便書與心相入自然有感發處讀易到精熟後顛倒說來皆合不然則是死說耳熟讀六十四卦則覺得繫辭之語直為精密是易之括例問性鈍讀書多記不得但須少看熟復子細推求義理自有得處五峯舊見龜山問為學之方龜山云且看論語五峯問論語中何者為切要龜山不對久之曰熟讀先生因謂直卿曰如今且只得挨將去讀書理㑹義理須是勇猛徑直理㑹將去如關羽擒顔良只知有此人更不知有别人直取其頭而歸若使既要斫此人又要斫那人非惟一力不給而其所欲得者不可得矣又如行路欲往處所却在道邉間處留滯則所欲到處何緣逹看此一章便須反覆讀誦逐句逐節互相發明如此三二十過而曰不曉其義者吾不信也學者只是要熟功夫純一而已讀時熟看時熟玩味時熟如孟子詩書全在讀時工夫孟子每章說了又自解了蓋他直要說得盡方住其言成一大片故後來老蘇亦拖他來做文章說須熟讀之便得其味先生謂陳淳曰大學已是讀過書宜朝夕常常溫誦勿忘讀書小作課程大施功力如合讀得二百字只讀得一百字却於百字中猛施工夫理㑹子細讀誦教熟如此不㑹記性人自記得無識性人亦理㑹得若泛泛然念多只是皆無益耳讀書不可兼看未讀者却當兼看已讀者凡人讀書若讀十遍不㑹則又讀二十遍又不㑹則讀三十遍至五十遍必有見處到五十遍暝然不曉便是氣質不好今人未嘗讀得十遍便道不可曉孟子之書明白親切無甚可疑只要日日熟讀須教他在吾肚中千百轉便自然純熟讀一件書須心心念念只在這書上令徹頭徹尾讀教精熟這說是如何那說是如何這說同處是如何不同處是如何安有不長進而今人只辦得十日讀書下著頭不與間事管取便别莫說十日只讀得一日便有功驗讀書不可記數數足則止矣後生輩誦書只是量力不要貪多仍須反復熟讀時時溫習是要法耳詩且逐萹旋讀方且旋通訓詁豈有不讀而自能盡通訓詁之理乎讀之多玩之久方能漸有感發豈有讀一二遍而便有感發之理乎古之學詩者固有待於聲音之助然今已無之無可奈何只得熟讀而從容諷咏之耳答羅參議書曰論孟中庸大學之書不可不熟讀而詳味章句之間雖若淺近不足用心然聖賢之言無不造極學之不博則約不可守今於六經未能遍考而止以論孟中庸大學為務則己未為博矣况又從而忽略之無乃太約乎所有書於理㑹得底更看過尤好先生云舊年思量義理未透直是不能睡初看子夏先𫝊後倦一章凡三四夜窮究是時徹夜聞鵑聲讀書須教首尾貫穿若一畨只草草看過不濟事先生問黃直卿論語近讀得如何曰尚看未熟先生曰這也使急不得也不可慢功效不可急工夫不可慢書無難易須使許多心力反覆去看問黃㽦常讀何書曰讀語孟曰如今看一件書須是著力至誠去看一畨將聖賢說底一句一字都理㑹過直要見聖賢語脉所在這一句一字是如何道理及看聖賢因何如此說直是用力與他理㑹如做寃讐相似理㑹教分曉然後將來玩味方盡見得意思出來若是泛濫看過今次又見是好明次又見是好終是無工夫不得力凡看文字且就本文上看看一假須反覆看來看去要爛熟方見意味快活令人都不欲看别假始得看文字須大假著精彩看聳起精神竪起筋骨不要困如有刀劍在後一般就一假中須要透擊其首則尾應擊其尾則首應方始是不可按册子便在掩了册子便忘却看注時便忘了正文看正文又忘了注須這一假透了方看後假聖人言語如千花逺望都見好須端的真見妙處始得須著力子細看工夫只在子細上别無他術書冝少看要極熟小兒讀書記得而大人多記不得者只為小兒心専一日授一百字則只是一百字二百字則只是二百字大人一日或百板不恁精専人多看一分之十今且看十分之二寬著期限緊著課程讀書便是學須緩緩精思其中義理方得只如此做此事讀書之法須是用工去看先一書許多工夫後則無許多工夫矣始初一書費十分工夫後一書則費八九分其後則費六七分又其後則四五分矣范伯崇云溫故而不知新雖能讀三墳五典八索九邱足以為史而不足以為師矣先生答曰此論甚佳吕子約云學原於思不致其思繹以通之則無自而進茍苦思力索則淺迫無味惟學焉而時復思繹勿忘勿助積纍停蓄浹洽涵飬杜元凱所謂如江海之浸膏澤之潤涣然氷釋怡然理順然後為得此即時習而悅之注釋也先生答曰此說甚佳先生答連嵩卿曰熟看上下文子細思索不可草草說過答楊子直書曰一生辛苦讀書微細揣摩零碎刮剔及此暮年略見從上聖賢所以垂世立教之意枝枝相對葉葉相當無一字無下落處答陳膚仲書曰讀書别無法只要耐子細是第一義也玩味得熟道理自然出先生與張敬夫書曰聖賢之言都只忙中草率看過不曽子細玩味則見處全不精明豈不可戒答邱子野書曰觀者一見而决玩者反復而不能舍之辭答黃子耕書曰於經史中求簡易用工處此亦别無他巧只是且將所以學者反復玩味不厭重復久之當自覺意味愈深逺理致愈明白耳此外昔所未學亦有切於修己治人之實者更以暇時量力探討使其表裏精粗通貫浹洽則於本原之地亦將打成一片無處不得力矣答宋深之書曰讀書要須辨得精粗得失乃於己分有益若但泛然看過即枉費工力矣先生語王過曰為學須要専一用工不可雜亂因舉異教數語云用志不分乃凝於神置之一處無事不辦讀書不精深只是不専一
