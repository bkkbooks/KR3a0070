body:
  text: 提要朱子讀書法四卷儒家類臣等謹案朱子讀書法四卷宋張洪齊􅮷同編洪字伯大􅮷字充甫皆鄱陽人事迹無可考據洪自序咸淳中分教四明􅮷適客逰浙東遂相與商確是書而刻諸鄞泮其書本朱子門人輔廣所輯巴川度正嘗屬遂寧于和之校刋鄱陽王氏復廣為後編洪與􅮷又因而補訂之以輔氏原本為上卷而以所續增者列為下卷皆以文集語類排比綴輯分門𨽻屬雖捃拾抄撮稗販舊文不足以言著述而條分縷析綱目井然於朱子一家之學亦可云覃思研究矣元時板已不存至順中江南行臺御史趙之維重鏤於集慶路學故永樂大典全帙收入原編卷次已不可考今酌其編帙釐為四卷俾講新安之學者有所考證焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀編定朱子讀書法原序聖賢之書聖賢之言也聖賢之言聖賢之意也學者學為聖賢而已既為聖賢之學必將因其言以求其意得其言而未得其意者有矣未有不得其言而得其意者也傅説之告髙宗曰學于古訓乃有獲吾夫子亦曰好古敏以求之何必讀書然後為學見哂於聖門也宜哉臯夔所讀何書世率以斯言藉口豈知帝王盛時化行俗美凡塗歌里詠之所接聲音采色樂舞之所形灑掃應對冠昏喪祭之所施莫非修道之教固不專在書也三代而下古人養德之具一切盡廢所恃以植立人極者惟有書耳此書之不可不讀也然讀聖賢之書者為不少矣鮮能至於聖賢者讀之無其法也漢唐説義理如説夢其間大儒言正心而不及誠意言誠意而不及致知格物法之未立學者將安適從乎故以了悟為髙者直謂格言大訓為胸中之障礙書且無取何取於法以記覽為工者又不過誇多鬭靡務以榮華其言希世取寵而已法於何有過猶不及等之為無得於道也不有先覺何以淑其後紫陽夫子生於建炎庚戍上符洙泗之運逺紹濓洛之傳吐辭為經家藏人誦言滿天下皆去言也然門人輔公所編讀書之法所以呼迷塗而飭稚昧者尤為深切著明甲寅便殿奏疏拳拳以為食芹之獻直謂此愚臣平生艱難辛苦已試之效雖帝王之學無以易之豈茍云乎哉洪嘗與親長德勝齊君增多而臚别之鄉友王君復盡索紫陽諸書倣為後編輒又同為之編定於是首尾具備條貫秩然學者儻慨然知俗學之可厭聖學之可傳於文公之法信之篤行之果使精神之胥契如師友之相逢以此而讀書其亦異乎人之讀書矣聖賢之意如日杲杲豈待單傳密付而後有得於道哉咸淳乙丑洪分教四明齊君適遊東浙益相與商榷是正其書乃成嘗謂此書之行可使人人知道人人為聖賢而受用之淺深則在夫人信向之分數耳洪一日袖呈師帥大參西澗先生先生捧誦驚喜謂足為後學指南不負儒先真切誨人之意助費召匠亟命鋟梓與學者共之吁聖人復起不易文公之言文公可作所以誨人者不過如此此義之存上帝臨汝是又非學者為聖賢之一助乎盍相與懋敬之哉雖然文公嘗謂學不是讀書不讀書又不知所以為學之道此語殆有深意昔潘氏磨鏡帖云僕自喻為昏鏡喻書為磨鏡藥當用此藥揩磨塵垢使通明瑩徹而後已若積藥鏡上而不施揩磨之功反為鏡纍豈非道理合下皆具用力之久一旦豁然貫通焉反身而誠萬物皆備豈拘拘尋行數墨間哉因取晦庵觀書有感二詩附于編首以發言外之意云丙寅孟春後學番陽張洪拜手書于鄞泮晦庵先生觀書有感半畝方塘一鏡開天光雲影共徘徊問渠那得清如許為有源頭活水來右一昨夜江邉春水生蒙衝巨艦一毛輕向來枉費推移力此日中流自在行右二讀書法者文公朱子之所常言而門人輔公漢卿之所編集也嘉惠後學可謂至矣巴川度侍郎正屬遂寧于和之校而刻之外舅雙澗張先生家藏刋本􅮷因得借觀天球琳琅不足喻斯寶也但其間踈略未盡雜亂無倫者間亦有之則恐學者未能見之瞭然何以使其守之確然哉故竊疑此漢卿草定而未修改之本􅮷僣於暇日與鄉親友龍山張君伯大因其舊文及取文公之言此而漢卿之未録者相與搜集附益更易次第先定綱領以載書之所當讀之故與讀之所當務之説復於中撮其樞要釐為六條曰循序漸進曰熟讀精思曰虛心涵泳曰切已體察曰著緊用力曰居敬持志而著其説於每條之下於是綱領條目粲然明白為上下兩卷蓋將按為定式確遵謹守尚企及文公之萬一凡我同志皆當從事於斯也竊嘗論之天下之事莫不有法法莫不有要得其要而遵守之則為其事者雖與人同所以為其事者實與人異他日所就必有卓然非儕流之所及者末藝且然而况讀書為吾儒之大業乎秦漢以來知讀書者衆矣然皆不足以與聞斯道之傳其務外者為誇多鬬靡其厭煩者為獨觀大略其平凡暗戅者不過尋行數墨為蠧魚為書肆其邪僻者聖讀而庸行其詭佞者則借聖言以文姦而已求其下帷潛心如仲舒者已寥寥間見况望其如濓溪關洛諸老先生明聖道之蘊奧傳聖心之精微乎是則彼非不讀書也讀書而不得其法也惟我文公稟命世之才負離倫之識而尤篤志於聖人之學其為學也窮理以致其知反躬以踐其實而貫之以敬其窮理則以讀書為本其讀書則以六者為法平日之所自務與其所以教人每切切乎此雖致之聖君言之賢相亦必欲其急先乎此此所以卓然能承道統之傳啓道學之祕盡發聖經賢傳之藴大開天下萬世之蒙也嗚呼盛矣豈非文公之讀書與人同而所以讀書與人異固若是耶六者之法有前賢之所已言者亦有前賢之所未及而出於文公之獨見者誠能確遵謹守罔有踰越則窮理盡性修身齊家以至得時行道而極於堯舜其君民莫不自是基之其功用豈淺哉抑愚謂從古聖賢非不言讀書也而每教人讀書以窮理則至文公而愈切關洛大儒亦非不言讀書之法也而及於循序致精與先看易曉者之云則自先生而始見其愈切者正如孔子多説仁字之意其始見者同於孟子性善養氣之功學者尤不可以不知也龍山君孝謹清修自幼用心於聖賢之所謂學十五年前相與編類此書咸淳乙丑􅮷適留會稽而張君職教四明郵傳如織因得益加是正而更定之於是無復遺恨張君且欲刋之鄞泮以惠多士是豈徒此書之幸學者遵是法而力行之斯道其幸乎其年秋仲番陽齊􅮷充甫謹序于越之蓬萊閣
