body:
  text: 朱子讀書法卷四宋張洪齊􅮷同編虚心涵泳讀書且須玩味不必立說且理㑹古人說教通透問讀易未能浹洽曰須是此心虛明寧静自然道理流通方包羅得許多義理看文字須是虚心則見道理明讀書而不能盡見其理只是心粗意廣凡解釋文義須是虚心玩索聖人言語義理該貫如絲髪相通若只恁大綱看過何緣見精微出來所以失聖人之意示及疑問且當如此涵泳甚善致知工夫亦只是且據所已知者玩索推廣將去具於心者本自無不足也虚心静慮宻切玩味乆之須自見得更有精微處不但如此而已今欲觀詩不若且置小序及舊說只將原詩虛心徐徐玩味候彷彿見箇詩人本意却從此推尋將去方有感發如人拾得一箇無題目詩再三熟看亦須辨得出來若被舊說一局局定便看不出今雖道不用舊說終被他先入在内不期依舊從他去某向作詩解文字初用小序至解不行處亦曲為之說後來覺得不安第二次解者雖存小序閒為辨破然終是不見詩人本意後來方知只盡去小序便自可通於是盡滌蕩舊說詩意方活戴明伯請教先生曰且將一件書讀聖人之言即聖人之心聖人之心即天下之理且逐叚看令分曉一叚分曉又看一叚如此至一二十叚亦未解便見箇道理但如此心平氣定不東馳西騖則道理自逐旋分明去得自家心上一病便是一箇道理明也道理固是自家本有但如今隔一隔了須逐旋揩磨呼喚得歸然無一喚便見之理不若且虚心讀書讀書切不可自謂理㑹得了便理㑹得且只做理㑹不得某見說不㑹底便有長進不長進者多是自謂己理㑹得了底如此則非特終身不長進便假如釋氏三生十六刼也終理㑹不得學者觀書且就本文上看取正意不須立說别生枝蔓惟能認得聖人句中之意乃善看書不由直路只管枝蔓便於本意不親切大底義理須是且虚心隨他本文正意看凡看文字且就本文上看看一叚須反覆看來看去要爛熟方見意味快活令人都不欲看外叚始得聖賢說出來底言語自有語脉安頓得各有所在豈似後人胡亂說了也須玩索其㫖所以學不可不講觀詩之法且虚心尋繹之不要被舊說粘定看得不活伊川解詩亦說得義理多了詩本只是恁地說話一章言了次章又從而歎詠之雖則無義而意味深長不可於名物上尋義理後人往往見其言只如此平淡只管添上義理却窒塞了他如一源清水只管將物事堆積在上便壅隘了學者觀書病在只要向前不肯退歩看愈向前愈看不得分曉不若退步却看得審大槩病在執著不肯放下今學者有二種病一是主私意一是舊有先入之說雖欲擺脫亦被他自來相尋窮理以虚心靜慮爲本看文字不可終日思量硬將心去馳逐亦須空閑少頃養精神又來看先生答張敬夫書曰聖賢之言平鋪放著自有無窮之味於此從容潛玩黙識而心通焉則學之根本於是乎立而其用可得而推矣患在立說貴於新竒推類欲其廣博是以反失聖言平淡之真味而徒爲學者口耳之末習先生答汪尚書書曰近世言道學者失於太髙讀書講義率常以徑易超絶不歴階梯爲快而於其閒曲折精微正好玩索處例皆忽略厭棄以爲卑近瑣屑不足留情以故雖或多聞博識之士其於天下之義理亦不能無所未盡曷若循下學上達之序口講心思躬行力究寧煩毋略寕下毋高寕淺毋深寧拙毋巧從容潛玩存乆漸明衆理洞然次第無隱然後知夫大中至正之極天理人事之全無不在是初無逈然超絶不可及者而幾微之閒毫釐畢察醻酢之際體用渾然雖或使之任至重而處所難亦沛然行其所無事而已又曰反覆玩味而有以自得之則心廣理明意味自别先生答吕伯恭書曰學者凡聖賢一言皆當潛心玩索要識得他底藴自家分上一一要用豈可不存留在胷次明道玩物䘮志之說蓋是箴上蔡記誦博識而不理㑹道理之病渠得此語遂一向掃蕩直要得胸中曠然無一毫所能則可謂矯枉過其正矣與袁機仲書曰須虚心遜志以求其通曉未可好髙立異以輕索其瑕疵答范文叔書曰徃年經無定說故讀書不能無疑近來衆說盡出講者亦多自是無所致疑但要反覆玩味認得聖賢本意道義實體不外此心便自有受用處耳尹和靖門人贊其師曰丕哉聖謨六經之編耳順心得如誦已言要當至此地位始是讀書人耳答游誠之書曰讀書玩理但嚴立功程寛著意思乆之自當有味不可求欲速之功也答柯國材書曰大概讀書且因先儒之說通其文義而玩味之使之浹洽於心自見意味可也如舊說不通而偶自見得别有意思則亦不妨但必欲於𫝊註之外别求所謂自得者而務立新說則於先儒之說或未能充而遽舍之矣如此則用心愈勞而去道愈逺恐駸駸然失天理之正而陷於人欲之私非學問之本意也答許順之書曰大抵文義先儒盡之葢古今人情不相逺文字言語只是如此但有所自得之人看得這意味不同耳其說非能頓異於衆也不可只管立說求竒恐失正理却與流俗詭異之學無異只據他文理反覆玩味乆之自明且是胸中開泰無許多勞攘此一事已快活了誠依此加功如何又曰讀書大抵只就事上理㑹看他語意如何不必過爲深昧之說却失聖賢本意自家用心亦不得其正陷於支離怪僻之域所害不細切宜戒之只就平易慤寔處理㑹也又曰向平易著實處子細玩索湏於無味中得味乃知有餘味之味耳答王近思書曰於古昔聖賢之言逐一反覆子細玩味勿遽立說以求近功則久之自有貫通處而胸次了然無疑矣又曰於先達所言擇取其精要者一說反覆玩味乆而不忘當自有心解處不可妄以私意穿鑿恐失之浸逺難收拾也答魏元履書曰論語中看得有味餘經亦迎刄而解聖人之言平易中有精深處不可穿鑿求速成又不可茍且閑看過直須是置心平淡慤實之地玩味探索而虛恬省事以養之遲久不懈當自覺其益切不可以輕易急迫之心求旦暮之功又不可因循媮惰虚度光陰也又曰尋常讀書只為胸中偶有所見不能黙契故不得已而形之於口恐其遺忘故不得已而筆之於書若讀書而先有立說之心則此一念已外馳矣若何而有味耶答程允夫書曰讀書剖析精微玩味久熟則衆說之異同自不能眩而反為吾磨礪之資矣答陳明仲書曰讀書當擇先儒舊說之當於理者反覆玩味朝夕涵泳使與本經正言之意通貫浹洽於胸中然後有益不必叚叚立說徒為觀美而實未必深有得於心也答胡廣仲書曰平心易氣熟玩而徐思之自當見得義理明白穩當處不必强說枉費心力也答江徳功書曰虛心平氣徐讀而審思乃見聖賢本意而在已亦有著實用處不必費力生說徒失本指而無所用也又曰聖賢之言意㫖深逺子細反覆十年二十年尚未見到一二分豈可撥冗看得一過便敢遽然立論似此恐不但解釋文義有所差錯且是氣象輕淺直與道理不相似願且放下此意思將聖賢言語反覆玩味直是有不通處方可權立疑義與朋友商量庶幾稍存沉浸醲郁氣象所繫實不輕也答嚴居厚書曰虛心平氣反覆諷誦乆當有味今以迫切之心求之正猶治絲而棼之雖欲强為之說終非吾心所安穿鑿支離愈叛於道矣答劉叔文書曰大凡看書須認得分明又兼始終方是不錯若未㑹得且虛心平看未要硬便主張乆之自有見處不費許多閑說話答黄仁卿書曰看書須随事觀理反復涵泳令胸次開闊義理通貫方有意味若使一向如此排定說殺正使在彼分上斷得十分的當却於自己分上都不見得箇從容活絡受用則亦何益於事耶大抵不論看書與日用工夫皆要放開心胸令其平易廣濶方可徐徐旋看道理浸灌培養切忌合下便立己意把捉得太𦂳了即氣象促迫田地陿隘無處著工夫也此非獨是讀書法亦是變化氣質底道理答黄直卿書曰為學直是先要立本文義却且與說出正意令其寛心玩味未可便令考校同異研究纎悉恐其意思促迫難得長進將來見得大意略舉一二節目漸次理㑹盖未晩也又曰人之學所以不進只緣從初無入處不見其有可嗜之味而所以無入處又只是不肯虚心遜志耐煩理㑹更無他病也答吕子約書曰讀古人書直是要虚著心大著肚髙著眼方有少分相應若左遮右攔前拖後拽隨語生解節上生枝則更讀萬卷書亦無用處也又曰虛心看聖賢所說言語未要將自家許多道理見識與之爭衡退歩乆之却須自有箇融㑹處盖自家道理見識未必不是只是覺得太多了却似都不容他古人開口不覺蹉過了他說底道理耳又曰大凡讀書須是虚心以求本文之意爲先若不得本文之意則是任意穿鑿又曰取孟子子思之言虛心平看且勿遽増他說只以訓詁字義隨句略解然後反求諸心以驗其本體之實為如何則其是非可以立制又曰讀書窮理須認正意切忌縁文生義附㑹穿穴只好做時文不是講學又曰胸中先有舊說為所牽制不得虛平故爾滯礙枉費心力可且將舊說權行倚閣而只將本文反復玩味久之自然漸虛漸平則於此無疑矣又曰放下許多道理平心看他文義向甚處去都不要將道理向前牽拽他待他文義有歸著去處稳帖分明後却有箇自然底道理出不容毫髪有所增損抑揚此處正好玩味大抵先要虛心耳又曰前賢語言寛廣不若今人急迫今人見得些道理便要鐫鑿開却正是心量小不耐煩耳答潘文叔書曰大抵讀書只合平心說理不必過求却失正意也答潘恭叔書曰近日學者之病苦其說之太髙與太多耳如此只見意緒叢雜都無玩味工夫不惟失却聖賢本意亦分却日用實功不可不戒答劉公度書曰此事别無竒妙只是見成說底便是道理只要虛心熟玩久之自然見得實處自是不容離叛便是到頭若更欲别求見解即是邪說鮮不流於異端矣答劉仲升書曰大抵學問平日不曾子細玩索義理不識文字血脉别無證佐考驗但據一時自己偏見便自主張以為只有此理更無别法只有自己更無他人只有剛猛剖决更無温厚和平一向自以為是更不聴人說話此固未論其所說之是非而其粗厲激發已全不似聖賢氣象矣答劉季章書曰為學若不寛著心胸細玩義理便要紐揑造作務為切己所以心意急迫而義未大明空自苦而無所得也又曰意思急迫不寛平務髙不務切而不肯平心實看道理只此意思亦殊礙人所見也又曰讀書且要虚心平氣随他文義體當不可先立己意作勢硬說只成杜撰不見聖賢本意也又曰讀書只随書文訓釋玩味意自深長今人却是背却經文横生他說所以枉費工夫不見長進又當以草略茍且為戒所謂随看便起是非之心此最說著讀書之病盖理無不具一事必有兩途今纔見彼說晝自家便尋夜底道理反之各說一邊互相逃閃更無了期今人問難往往類此甚可笑也又曰江西人尚氣不肯随人後凡事要自我出自由自在故不耐煩如此逐些細㑹須要立箇髙論籠罩將去譬如讀書不肯從上至下逐字讀去只要從東至西一抹横說乍看雖似新巧壓得人過然横抝粗疎不成義理全然不是聖賢當來本說之意則於己分究竟成得何事只將排比章句玩索文理底工夫換却許多杜撰計較别尋路脉底心力須是實有用力處乆之心地自然平夷見理明徹庶幾此學有𫝊不至虛負平生也答胡季随書曰所示諸說似於中庸本文不曾虛心反覆詳玩章句之所絶文義之所指尚多未了而便欲任意立說展轉相髙故其說支蔓纒繞了無歸宿莫若且就本文細看覺得章斷句絶文理分明即聖人指意所在與今日用力之方不待如此紛拏辨說而思巳過半矣答沈晦叔書曰虚心熟讀看得本意分明却取諸說之通者錯綜於其閒方為盡善若合下便雜諸説輥看則下梢只得周旋人情不成理㑹道理矣横渠先生言觀書有疑當濯去舊見以來新意此法最妙答項平父書曰大抵既為聖賢之學須讀聖賢之書既讀聖賢之書須看得他所說本文上下意義字字融釋無窒礙處方是㑹得聖賢立言指趣識得如今為學工夫固非可以懸空白撰而得之也又曰明敏太過不能深潛宻察反覆玩味只略一線路可通便謂理只如此所以為人所惑虛度光隂也答王季和書曰道之在人初非外鑠而聖賢垂訓又皆懇切明白但能虛心深味其㫖而反之於身必有以信其在我而不容自己則下學上達自當有所至矣答黄冕仲書曰讀書且就分明處㸔覷涵泳不必過為考索久之浹洽自然通透也答李守約書曰讀書之法無他惟是篤志虛心反覆詳說爲有功耳近見學者多是率然穿鑿便為定論或即信所𫝊聞不復稽考所以日誦聖賢之書而不識聖賢之意其所誦說自是據自家見識撰成耳如此豈復能有長進答趙子欽書曰近世學者不能虚心退步徐觀聖賢之言以求其意而直以己意强寘其中所以不免穿鑿破碎之弊使聖賢之言不得自在而常為吾說之所使以至刼持縳束而左右之其或傷於形體而不恤也如此則自我作經可矣何必曲躬俯首而讀古人之書哉又曰大抵讀書須見得有曉不得處方是長進又更就此闕其所疑而反覆其餘則庶幾得聖人之意識事理之真而其不可曉者不足為病矣又曰近日學者例有好髙務廣之病将聖人言語不肯就當下著實處看須要說教元妙深逺添得支離蔓衍未論於己無益且是令人厭聼若道理只是如此前賢豈不㑹說何故却只如此平淡簡短都無一種似此大驚小怪底浮說盖是看得分明思得爛熟只有此話别無可說耳今學者只當虛心玩味各随本文之意而體㑹之其不同處自不相妨不可遽以己意横作主張必欲挽而同之以長私意增衍說終日馳騖於虛詞浮辯之閒而於存養省察日用之功反有所損而無益也答徐居厚書曰平心和氣却是吾人學問根本不必大叚著力記當損人心力使人血氣不舒易生疾病况古人之學自有正當用力處此等只是随力随分開廣規模若專恃此亦成何等學問耶答傅子淵書曰賢者勇於進道而果於自信未嘗虚心以觀聖賢師之言而一取决於胸臆氣象言語只是禪家張皇鬭怒殊無寛平正大沉浸醲郁之意荆州所謂有拈槌竪佛意思者可謂一言盡之答潘文叔書曰讀書亦無他說只是虗心平氣闕其所疑随力量看教浹洽便自有得力處不須預為計較必求赫赫之近功也答蔡季通書曰大抵思索義理到紛亂窒塞處須一切掃去放教胷中空蕩蕩地却舉起一看便自覺得有下落處答程允夫書曰吾弟明敏看文字不費力見得道理容易分明但似少却玩味工夫故此道理雖看得似分明却與自家身心無干涉所以滋味不長乆纔過了便休反不如遲鈍之人多費工夫方看得出者意思却乆逺此是本原上一大病非一詞一義之失也答陸子夀書曰大凡讀書當煩亂疑惑之際正當虚心博采以求至當或未有得亦當且以闕疑闕殆之意處之若遽以己所粗通之一說而盡廢已所未有之衆論則非惟所處之得失或未可知而此心之量亦不宏矣答林正卿書曰大率朋友看文字多有淺迫之病淺則於其文義多所不盡迫故於其文理亦或不暇周悉兼義理精微縱横錯綜各有意脉今人多是見得一邊便就此執定盡廢他說此乃古人所謂執徳不宏者非但讀書為然也答汪叔耕書曰夫道在目前初無隐蔽而衆人沉溺膠擾不自知覺是以聖人因其所見道體之實發之言語文字之閒以開悟天下與來世其言丁寧反覆明白切至惟恐人之不解了也豈有故為不盡之言以愚學者之耳目必俟其單𫝊宻付而後可以得之哉但患學者未嘗虚心靜慮優柔反覆而妄以己意輕為之說是以不知其味而妄意乎言外之所𫝊耳答陳才卿書曰大凡讀書須且虚心參驗乆當自見切忌便作見解主張也答張元徳書曰大抵讀書須是虚心静慮依傍文義根尋句脉看定此句指意是說何事略用今人言語襯貼替換一兩字說得古人意思出来先教自家心裏分明歴落如與古人對面說話彼此對荅無一言一字不相肯可此外都無閑雜說話方是得箇入處怕見如此棄却本文肆為浮說說得郎當都㤀了從初因甚話頭說得到此此最學者之大病也答王晉輔書曰為學大概且將聖賢之言從頭逐字訓釋逐句精詳逐叚反覆虚心量力且要曉得句下文意未可便肆己見妄起浮論也答杜貫道書曰讀書課程甚善但思慮亦不可過苦但虚心㳺意時時玩索乆之當自見縫罅意味也答李晦叔書曰大抵讀書當擇先儒舊說之當於理者反覆玩味朝夕涵泳使與本經之言之意通貫浃洽於胸中然後有益不必叚叚立說徒為觀美而實未有得於心也答孫敬父書曰前賢讀書窮理非不精詣而於平常文義却有牽强費力處此猶是心有未虚氣有未平而欲速之意勝也可不戒哉答或人書曰大抵讀書且是虛心考其文詞指意所歸然後可以要其義理之所在近見學者多是先立己見不問經文向背之勢而横以義理加之其說雖不背理然非經文本意如此則但據己見自為一書何必讀古聖賢之書哉所以讀書政恐吾之所見未必是而求正於彼耳惟其闕文斷簡名器物色有不可考者則無可奈何其他在義理中可推而得者切須字字句句反覆精詳不可草草說過也與或人書曰降心遜志且就讀書講學上子細用功乆之自有見處義理細宻直是使麄心看不得乍看極是繁碎乆之純熟貫通則綱舉目張有自然省力處先生䟦林汝器論語說曰語孟聖賢之書本自平易又有諸先生相為發明義理昭著如日星然學者體味於心念念不已自然血脉通貫無所底滯然後可言有益於吾身不然涉獵强記無沉浸醲郁之功則其所資亦淺焉耳論文義且只據所讀本文逐句逐字理㑹教分明不須旁引外說枝蔓㳺衍反為無益如論浩然之氣便須直看公孫丑所問意思如何孟子所說如何一徑理去使當時問答之意一一明白了然後却更理㑹四旁餘意未曉處今孟子之意未能曉得又却轉從别處去末梢都只恁休去也答蘇晉叟書曰讀書且當随文熟看俟其詞㫖曉析貫通然後自有發明未可遽捨本文别立議論徒長虛見無益於實也答曾景建書曰讀書須量力少看而熟復之只依文義尋箇明白去處自然有味不在極力苦思轉求轉逺也答胡季随書曰講論文字須且屏去私心然後可以詳考文義以求其理之所在若不如此而只欲以言語取勝則雖累千萬言終身競辨亦無由有歸著矣答陸梭山書曰熹之愚陋竊願尊兄更於二家之言少賜反覆寛心㳺意必使於其所說如出於吾之所為者而無纎芥之疑然後可以發言立論而斷其可否則其為辨也不煩而理之所在無不得矣若一以急迫之意求之則於察理已不得精而於彼之情又不詳盡則徒為紛紛而雖欲不差不可得矣答陸象山書曰某記頃年嘗有平心之說而前書見喻曰甲與乙辯方各自是其說甲則曰願乙平心也乙亦曰願甲平心也平心之說甚難明白不若據事論理可也此言美矣然某所謂平心者非直使甲操乙之見乙守甲之說也亦非謂都不論事之是非也但欲兩家姑暫置其是己非彼之意然後可以據事論理而終得其是非之實如欲治疑獄者當公其心非謂便可改曲者為直直者為曲也亦非謂都不問其曲直也但不可先以己意之向背為主然後可以審聴兩造之辭旁求參伍之騐而終得其曲直之當耳今以麄淺之心挾忿懟之氣不肯暫置其是己非彼之私而欲評義理之得失則雖有判然如黑白之易見者猶恐未免於誤况其差有在於毫釐之閒者又將誰使折其衷而能不謬也哉答吕子約書曰斆學之功交相為助政自不惡但所論頗覺支蔓恐皆是道理太多随語生解要須滌除令胸中虛明直截然後真箇道理方始流行不至似此支蔓勞攘徒為心害有損無益也又曰講論不子細看先横著一箇人我之見在胷中於已說則只尋是處雖不是亦瞞過了於人說則只尋不是處吹毛求疵多方駁難如此則只長得私見豈有長進之理答林叔和書曰嘗觀當世儒先講學初非甚異止緣自是太過而謂他人所論一無可取遂至各立門庭互相非毁使學者觀聴惶惑不知所從竊意莫若平視彼己公聼並觀兼取衆長以為己善擇其切於己者先次用力而於其所未及者姑置而兩存之俟所用力果有一入頭處然後以次推究纎悉詳盡不使或有一事之遺然後可謂善學不可遽是此而非彼入主而出奴也答柯國材書曰大抵講學只要理㑹義理義理非人所能為乃天理也天理自然各有定體以為深逺而抑之使近者非也以為淺近而鑿之使深者亦非也學者患在不明此理而取决於心夫心何常之有好髙者已過髙矣而猶患其卑滯於近者已太近矣而猶恐其逺此道之不明不行而學者所以各自為方而不能相通也答丁賔臣書曰夫道在生人日用之閒而著於聖賢方册之内固非先知先覺者所獨得而後来者無所與也又非先知先覺者所能耑而後来者不得聞也患在學者不能虛心循序妄意躐等自謂有見講論之際又不過欲人之知已而不求其益欲人之同己而不求其正一有不合則遂發憤肆罵而無所不至此所以求之愈迫而愈不近也答吕子約書曰所云未發不可比純坤而當為太極此却不是小失不敢随例放過且試奉扣若以未發為太極則已發無太極耶若謂純坤不得為未發則宜以何卦為未發耶竊恐更宜静坐放教心胸虗明净潔却將太極圖及十二卦安排頓放令有去著方可下語此張子所謂濯去舊見以来新意者也切己體察大學一書如行程識得行程便須行始得若只讀得空殻子亦無益也先生嘗舉程子讀論孟切己之說且如學而時習之切已看當時曾時習否句句如此求之則有益矣切己工夫要得不差先須辨義利所在為學須是己分上做工夫有本領方不作言語說若無存養儘說得明自成兩片亦不濟事况未必說得明乎要須發憤㤀食痛切去做身分上工夫莫荏苒嵗月可惜也王子充問讀書未見得切見之事方切先生曰不然論語第一教人學便是孝弟求仁便戒人巧言令色便是三省可謂甚切學須做自家底看便見切己今人讀書只要科舉用己第則為雜文用其髙者則為古文用皆做外靣看先生語周謨曰凡讀易而能句句體驗毎存兢慄戒慎之意則於己為有益不然亦空言耳又曰舜弼講論多是不切己而止於文字上揑合所以無意味不得力須更就此斡轉方有實地工夫也又曰讀書則實究其理行已則實踐其迹念念鄉前不輕自恕則在我者雖甚孤髙然與他人元無干預亦何必私憂過計而陷於同流合汙之地乎識得聖人言語便曉得天下道理曉得理便能切己用功看文字須是切己則自體認得出今人講明制度名器皆是當然非不是學但是於自己身上大處却不曽㑹何貴於學先生書謂林充之曰近讀何書恐更當於日用之閒深加省察而去其害此者為佳不然誦讀雖精而不踐其實君子盖深耻之答歐陽慶似書曰今之學者不知古人為己之意不以讀書治已為先而急於聞道是以文勝其質言浮於行而終不知所底止答董叔仲書曰讀書先看大指却就諸說一一就自已分上體當出來庶幾得力耳答黄子耕書曰日用之閒更看自已分内許多道理甚底是欠闕處随處操存随處玩索不妨自有餘樂何至於焦躁耶答劉仲升書曰所喻玩味見成義理甚善然亦須就自己分上體當方見真實意味也答曾㤗之書曰疑義且當闕之却於分明易曉切於日用治心修己處深自省察有不合處却痛加矯革如此方是為已工夫不可只於文字語言上著力也答方賓王書曰大學之本末始終無非己事但須實進得一等方有立脚處做得後叚工夫真有效驗耳非謂前叚工夫未到即都不照管後叚而聴其自爾也答俞夀翁書曰捐去浮華還就自己分上切近著實處用功庶幾自有欲罷不能積累貫通之效若未得下手處恐未免於臆度虚談之弊也答李伯諫書曰學者之病在於為人而不為己若實有為己之心但於此顯然處嚴立規程力加持守日就月将不令退轉則便是孟子所謂深造以道者盖其所謂深者乃工夫積累之深而所謂道者則不外乎日用顯然之事及其真積力乆内外如一則心性之妙無不存而氣質之偏無不化所謂自得之而居安資深也豈離外而内惡淺而深舍學問思辨力行之實而别有從事心性之妙哉答詹體仁書曰為學是分内事纔見髙自標致便是不務實了更說甚底今日正當反躬下學讀書則以謹訓說為先修身則以循規矩為要除却許多懸空閑說庶幾平稳耳答胡平一書曰日用切己之功聖賢之言詳矣其在大學論孟中庸者文義分明指意平實讀之曉然如見父兄說門内事無片言半詞之可疑者什八九也先生跋胡澹菴論語說序曰通經之士固當終身踐言乃為不負所學斯言之要所以警乎學者可謂至深切矣然士之必欲通經正為講明聖賢之訓以為終身踐履之資耳非直以分章析句為通經然後乃求踐言以實之也先生跋洪芻靖莭祠記後曰讀洪芻所撰靖莭祠記其於君臣大義不可謂懵然無所知者而靖康之禍芻乃縱慾忘君所謂悖逆穢惡有不可言者送學榜示講堂一日使諸生知學之道非知之難而行之艱也開卷便有與聖賢不相似處豈可不自鞭䇿先生答林伯和書曰大抵見善必為聞惡必去不使有頃刻悠悠意態則為學之本立矣異時漸有餘力然後以次漸讀諸書旁通當世之務盖亦未晚若不務此而但欲為依本分無過惡人則不惟無以自進於日新正恐無本可據亦未必果能依本分無過惡也先生曰某之講學所以異於科舉之文正是要切己行之若只恁地說過依舊不濟事若實是把做工夫只是敬以直内義以方外八字一生用之不盡又曰某近覺得學者所以不成箇頭項者只緣聖賢說得多了既欲為此又欲為彼如說敬以直内義以方外若實下工夫見得真箇是敬立則内直義形而外方這終身可以受用今人却似見得這兩句好又見說克己復禮也好又見說出門如見大賓也好空多了少閒却不把捉得一項周全李貫之曰敬能集義義不離敬敬不容不義義不容不敬敬義夾持則心常存心存則心熟而智益明敬義二字該盡六經語孟中所言之理先生答蔡季通書曰文字之外要當有用心處乃為究竟耳論看二程語錄而及此著𦂳用力凡事不可著箇且字其病甚多或言在家衮衮但不敢㤀書冊亦覺未免閒斷先生曰只是無志若說家事又如何汩沒得自家公今三五年不相見又只恁地悠悠人生有幾箇三五年耶孔門答問曾子聞得底話顔子未必與聞顔子聞得底話子貢未必與聞今却合在論語一書後世學者豈不幸事但患自家不去用心人若辦得十年来世閒甚書讀不了横渠教人道夜閒自不合睡只為無可應接他人皆睡了已不得不睡他做正䝉時或夜裏黙坐徹曉他直是恁地勇方做得讀書須要耐煩努力翻了巢穴譬如煎藥初煎時須著猛火待滚了却退著以慢火養之讀書亦如此須磨厲精神去理㑹天下事非燕安暇豫之可得諸友只有箇學之意都散漫不恁地勇猛恐虛度了日子須著火急痛切意思嚴了期限䟎了工夫辦箇月日氣力去攻破一過便就裏面旋旋涵養如攻寨須出萬死一生之計攻破了闗限始得而今都打寨未破只循寨外走道理都咬不斷何時得透古人謂心堅石穿盖未嘗有做不得底事如公幾年讀書不長進時皆緣自恁地搭滯了今學者不見有奮發底意思只是如此悠悠地過今日見他是如此明日見他亦是如此某今見得這物事了覺得與人學射劇相似舊時未理㑹得是下多少工夫而今學者却恁地泛泛然都沒𦂳要不把當事只是謾學理㑹得時也好理㑹不得時也不妨恁地如何得須是如射箭相似把著弓須是射得中方得答陳膚仲書曰近覺朋友讀書多是茍簡未曾曉㑹得便只如此打過何况更要他将已曉㑹得處反覆玩味言外别見新意决是有所不能矣以此理㑹文字只是備禮無一字做得到底悠悠泛泛半明半暗都不成次第如何得有一箇半箇發憤忘食索性理㑹教十分透徹少慰衰朽之望乎答劉季章書曰懶惰一病無藥可醫人之所以懶惰只緣見此道理不透所以一向提掇不起若見得道理分明自住不得豈容更有懶惰時莭耶答胡季随書曰吕伯恭嘗謂道理無窮學者先要不得有自足之心此至論也答李守約書曰直須痛自循省勇猛奮發方有下工夫處若只如此悠悠恐無入徳之期也答陳超宗書曰為學雖有階漸然合下立志亦須畧見義理大槩規模於自己方寸閒若有箇惕然愧懼奮然勇決之意然後可以加討論玩索之功存養省察之力而期於有得夫子所謂志學所謂發憤正為此也若但悠悠泛泛無箇發端下手處而便謂可以如此平做將去則恐所謂荘敬持養必有事焉者亦且若存若亡徒勞把捉而無精明的確親切至到之效也答郭希吕書曰大抵學者不可有放過底事久之不已雖無𦂳要工夫亦有得力處也答陳膚仲書曰閒隙時不可閑坐說話過了時日須偷些小工夫看些小文字窮究聖賢所說底道理乃可以培植本原庶幾枝葉自然張旺耳答許順之書曰天下事無不可為但在人自强如何耳答黄嵩老書曰大抵人情苦於猶豫多致因循一向懶廢今但心所欲為向前便做不要遲疑等待即只此目下頃刻之閒亦須漸見功效矣年運易往時不待人况中嵗以後尤宜汲汲也答陳才卿書曰人生虚浮朝不保夕深可警懼真當勇猛精進庶㡬不虚作一世人也答周南仲書曰聖賢遺訓具在方策何用遲疑等待何用凖擬安排只從今日為始随處提撕随處収拾随時體究随時討論但使一日之閒整頓得三五次理㑹得三五事則日積月累自然純熟自然光明若只如此立得箇題目頓在面前又却低徊前却不肯果决向前真實下手則悠悠嵗月豈肯待人恐不免但為自欺自誣之流而終無得力可恃之地也答度周卿書曰讀書探道有新功否嵗月易失義理難明但於日用之閒随時随處提撕此心勿令放逸而於其中随事觀理講求思索沈潛反覆庶於聖賢之教漸有宻相契處則自然見得天道性命真不外乎此身而吾之所謂學者舍是無有别用力處矣先生同安諭學者曰夫學者所以為己而士有或患貧賤勢不得學與無所從學而已得學又不為無所從學而猶不勉是亦未嘗有志於學而已居敬持志若不能敬則講學無安頓處看文字却是索居獨處好用工夫方専精看得透徹人之為學千頭萬緒豈可無本領此程先生所以有持敬之語敬只是提撕此心教他光明則於事無不見乆之自然剛健有力不持敬看道理便都散不聚在這裏心不定故見理不得今且未要讀書須先定其心使之如止水如明鏡暗鏡如何照物問讀書心多散亂曰便是心難把捉處向時舉中庸誠者物之終始不誠無物說與直卿云且如讀十句書上九句有心記得心不走作則是心在此九句内是誠是有其物故終始得此九句用若下一句心不在焉便是不誠便無物也因論讀大學答以每為念慮攪擾頗妨工夫曰只是敬敬是常惺惺底法以敬為主則百事皆從此做去今人都不理㑹我底自不知心所在却要理㑹他事又要齊家治國平天下心者身之主也撑船須用篙喫飯須用匙不理㑹心是不用篙不使匙也攝心只是敬纔敬看做甚麽事登山固只這箇心入水亦只這箇心先生問汪長孺名徳輔所讀何書長孺誦大學所疑曰只是輕率公不惟讀聖賢之書如此凡說話及論人物亦如此只是不敬後如此看文字理㑹不出只緣主一工夫欠闕先生答陳膚仲書曰讀書固收心之一助然今只讀書時収得心不讀書時便為事所奪而是心之存也常少而其放也常多矣胡為不移此讀書工夫向不讀書處用力使動靜兩得而此心無時不存乎答鄭仲禮書曰讀書固不可廢然亦須以主敬為先方可就此田地上推尋義理見諸行事若平居泛然略無存養之功又無實踐之志而但欲曉解文義說得分明則雖盡通諸經不錯一字亦何所益况未必能通而不誤乎近覺朋友讀書講論多不得力其病皆出於此不可不深戒也答李晦叔書曰持敬讀書只是一事而表裏各用力耳若有所偏便疑都不曾做工夫今且逐日著實做将去未須比量難易計較得失徒然紛擾不濟事要令日用之閒只見本心義理都不見有他物方有得力處耳答詹元善書曰君子之為學荘敬涵養以立其本而講於義理以發明之則其口之所誦也有正業而心之所處也有常分矣至於希世取寵之事不惟有所愧而不敢實亦有所急而不暇焉答羅縣尉書曰古人之學以荘敬持守為先而讀書窮理以發其趣
