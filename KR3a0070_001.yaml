body:
  text: 朱子讀書法卷一宋張洪齊􅮷同編綱領陳希周問讀書修學之門先生曰所謂讀書者只要理㑹這箇道理治家有治家道理居官有居官道理雖然頭面不同然只是一理如水遇圓處圎遇方處方小處小大處大然只是一水爾人之生道理合下皆完具所以要讀書者蓋是未曾經歷見得許多聖人是經歷見得許多所以寫在册子上與人看而今讀書只是要見得許多道理先要讀書理㑹道理蓋先學得在這裏到臨時應事接物撞著便有用處而今只管說治心修身若不見這箇理心是如何地治身是如何地修若如此說資質底便養得成只是箇無能底人資質不好便都執縛不住了傅說云學於古訓乃有獲事不師古以克永世匪說攸聞古訓何消得讀他做甚底蓋聖賢說出道理都在裏面必學乎此而後可以有得聖人之學與俗學不同聖人教人讀書只要知所以為學之道俗學讀書便只是讀書更不理㑹為學之道如何先生記婺源藏書閣有曰道之在天下其實原於天命之性而行於君臣父子兄弟朋友之間其文則出於聖人之手而存於易書詩禮春秋孔孟氏之籍本末相須人言相發皆不可一日而廢焉者也蓋天理民彛自然之物則按原本物則誤作初則今從朱子文集改正其大倫大法所在固有不依文字而立者然古之聖人欲眀是道於天下而垂之萬世則其精微曲折之際非託於文字亦不能以自𫝊也故伏羲以降列聖繼作至於孔子然後所以垂世立教之具粲然大備天下後世之人自非生知之聖則必由是以窮其理然後知有所至而力行以終之固未有飽食安坐無所猷為而忽然知之兀然得之也故傅說之告髙宗曰學於古訓乃有獲而孔子之教人亦曰好古敏以求之是則君子所以為學致道之方其亦可知也已然自秦漢以來士之所求乎書者類以記誦剽掠為功而不及乎窮理修身之要其過之者則遂絶學捐書而相與馳騖乎荒虛浮誕之域蓋二者之蔽不同而於古人之意則胥失之矣嗚呼道之所以不明不行不以此歟先生記稽古閣有曰人之有是身也則必有是心有是心也則必有是理若仁義禮智之為體惻隱羞惡恭敬是非之為用是則人皆有之非由外鑠我也然聖人之所以教不使學者收視反聽一以反求諸心為事而必曰興於詩立於禮成於樂又曰博學審問慎思明辨而力行之何哉蓋禮雖在我而或蔽於氣禀物欲之私則不能以自見學雖在外然皆所以講乎此理之實及其浹洽貫通而自得之則又初無內外精粗之間也世變俗衰士不知學挾册讀書者既不過於誇多鬭靡以為利祿之計其有意於為己者又直以為可以取足於心而無俟於他求也是以墮於佛老虛空之邪見而於義理之正法度之詳有不察焉其幸而或知理之在我與夫學之不可以不講者則又不知循序致詳虛心一意從容以㑹乎在我之本然是以急遽淺迫終不能浹洽而貫通也嗚呼是豈學之果不可為書之果不可讀而古先聖賢所以垂世立教果無益於後來也哉道之不眀可歎也已先生曰學者望道未見固必即書以窮理茍有見焉亦當博考諸書有所證驗而後實有所禆助而後安不然則其德孤而與枯槁寂滅者無以異矣潜心大業何有哉矧自周衰教失禮樂飬德之具一切盡廢所以維持此心者惟有書耳又曰人嘗讀書庶幾可以管攝此心使之常存橫渠有言書所以維持此心一時放下則一時德性有懈又曰讀書一舉兩得這邉理㑹又到這邉又存得心詎可􅀈轢輕𫝊遂指為糟粕而不觀乎要在以心體之以身踐之而勿以空言視之而已矣以是存心以是克己仁豈逺乎哉或問讀論孟之法奈何曰循序而漸進熟讀而精思可也曰請問循序漸進之說曰以二書言之則先論後孟通一書而後及一書以一書言之則其篇章文句首尾次第亦各有序而不可紊也量力所至約其程課而謹守之字求其訓句索其㫖未得乎前則不敢求乎後未通乎此則不敢志乎彼如是循序而漸進焉則志定理明而無踈易凌躐之患矣是不惟讀書之法實乃操心之要始學者不可不知也曰其熟讀精思何也曰論語每章不過數句易以成誦成誦之後反覆玩味於燕閒靜一之中以須其浹洽可也孟子每章或千百言反覆論辨雖若不可涯者然其條理疏通語意明潔徐讀而以意隨之出入往來以十百數則其不可涯者將有以得之於指掌之間矣大抵觀書先須熟讀使其言皆若出於吾之口繼以精思使其意皆若出於吾之心然後可以有得爾至於文義有疑衆說紛錯則亦虛心靜慮勿遽取舍於其間先使一說自為一說而隨其意之所之以驗其通塞則其尤無義理者不待觀於他說而先自屈矣復以衆說互相詰難而求其理之所安以考其是非則其似是而非者亦將奪於公論而無以立矣大率徐行郤立處靜觀動如攻堅木先其易者而後其節目如解亂繩有所未通則姑置而後徐理之此觀書之法也曰讀書亦通其本㫖而已而於衆說思之若是其詳將不為支離之甚耶曰不然也讀書所以明理而明理者欲其有以燭乎細微之間而不差也故惟考之愈詳則察之愈密察之愈密則吾心意志慮戞刮磨礪而愈精吾心愈精則天下之理至於吾前者其毫釐杪忽之不齊則吾必有以辨之矣若乃務為簡易而以略通大指不求甚解為髙吾恐其弊將至於儱侗顢頇處義不精而於擇善誠身之功亦將有所闕也道不前定臨事倉卒然後駭而圗之則其所謂簡易者是乃所以為支離耳循序漸進熟讀精思兩條本此然此所謂序乃每書誦讀考察之序耳又先生嘗上疏曰為學之道莫先於窮理窮理之要必在於讀書讀書之法莫貴於循序而致精而致精之本則又在於居敬而持志此不易之理也夫天下之事莫不有理為君臣者有君臣之理為父子者有父子之理為兄弟為夫婦為朋友以至出入起居應事接物之際亦莫不各有其理有以窮之則自君臣之大以至事物之微莫不知其所以然與其所當然而亡纎芥之疑善則從之惡則去之而無毫髮之纍此為學所以莫先於窮理也至論天下之理則要妙精微各有攸當亘古亘今不可移易惟古之聖人為能盡之而其所行所言無不可為天下後世不易之大法其餘則順之者為君子而吉背之者為小人而凶吉之大者則能保四海而可以為法凶之甚者則不能保其身而可以為戒是其粲然之迹必然之效蓋莫不具見於經訓史策之中欲窮天下之理而不即是以求之則是正墻面而立耳此窮理所以必在於讀書也若夫讀書則其不好之者固怠忽間斷而無所成矣其好之者又不免乎貪多而務廣往往未啓其端而遽已欲探其終未究乎此而忽己志在乎彼是以雖復終日勤勞不得休息而意緒匆匆常若有所奔趨迫逐而無從容涵泳之樂是又安能深信自得常久不厭以異於彼之怠忽間斷而無所成者哉孔子所謂欲速則不逹孟子所謂進鋭者退速正謂此也誠能鑒此而有以反之則心潜於一久而不移而所讀之書文意接連血脉貫通自然漸漬浹洽心與理㑹而善之為勸者深惡之為戒者切矣此循序致精所以為讀書之法也若夫致精之本則在於心而心之為物至虛至靈神妙不測常為一身之主以提萬事之綱而不可有頃刻之不存者也一不自覺而馳騖飛揚以徇物欲於軀殼之外則一身無主萬事無綱雖其俯仰顧盻之間蓋已不自覺其身之所在而况能反覆聖言參考事物以求義理至當之歸乎孔子所謂君子不重則不威學則不固孟子所謂學問之道無他求其放心而已矣者正謂此也誠能嚴恭寅畏常存此心使其終日儼然不為物欲之所侵亂則以之讀書以之觀理將無所往而不通以之應事以之接物將無所處而不當矣此居敬持志所以為讀書之本也此數語者皆愚臣平生為學艱難辛苦已試之效竊意聖賢復生所以教人不過如此蓋雖帝王之學殆亦無以易之循序致精一語兼循序漸進熟讀精思二條而居敬持志一條正本此疏之語也先生答陳福公書曰某嘗聞之師友大學一篇乃入德之門户學者當先講習知得為學次第規模乃可讀語孟中庸究見義理根源體用之大略然後徐考諸經以極其趣庶幾有得蓋諸經條例不同工夫浩博若不先讀大學論孟中庸令胸次開明自有主宰未易遽求也為學之初尤當深以貪多躐等好髙尚異為戒耳然此猶是知見邉事若但入耳出口以資談說則亦何所用之既已知得便當謹守力行乃為學問之實耳循序漸進中羣書先後緩急序本此先生答江端伯書曰所議為學之方足見留意事物未至不可逆料誠如所論惟有因聖賢之所已言者玩索之為庶幾耳故為學不可不讀書讀書之法又當沉思反覆涵泳銖積寸纍久當見功理明心亦自定若欲為涉躐而求此理之明又欲求方便以望此心之定亦難矣即聖賢之言平易明白處虛心平氣熟玩而躬行之玩之深則理自明行之熟則力自進持之以久下學而上達則道體精微之妙聖賢親切之傳不待單傳密付而已了然於心目之間矣先生書於讀書之所曰斂身正坐緩視微吟虛心涵泳切己體察虛心涵泳切己體察兩條本此寬著期限緊著課程著緊用力一條蓋本此下一句研精覃思以究其所難知平心易氣以聽其自得程正思曰讀書必正心肅容計遍數熟讀遍數已足而未成誦必欲成誦遍數未足雖已成誦必滿遍數一書已熟方讀一書毋務泛觀毋務强記非聖之言勿讀無益之文勿觀先生嘉其言司馬溫公說為學之法舉荀子四句云誦數以貫之思索以通之為其人以處之除其害以持養之大凡讀書少看熟讀一也不要煩碎立說但要反覆體驗二也埋頭理㑹不要求效三也三者學者當守此凡讀書須整頓几案令潔淨端正將書策齊整頓放正身體對書册詳緩看字子細分明讀之須要讀得字字響亮不可誤一字不可少一字不可多一字不可倒一字不可牽强暗記只是要多誦遍數自然上口久逺不忘古人云讀書千遍其義自見謂讀得熟則不待解說自曉其義也余嘗謂讀書有三到心到眼到口到心不在此則眼看不子細心眼既不専一却只漫浪誦讀決不能記記亦不能久也三到之中心到最急心既到矣眼口豈有不到者乎循序漸進序有二一是羣書先後緩急之序一是每書誦讀考索之序羣書先後緩急失其序則迂回艱苦而不切於其身每書誦讀考索失其序則匆遽急迫而無得於其心皆非讀書之法也序有兩樣不可只作一般看然朱子本意則主在於每書誦讀考索之序此最為透過致知一關之妙法朱子所自得處専在此所以甲寅奏疏拳拳於循序致精之一言正此之所謂序也讀者詳之或曰程子之先大學而後論孟且又不及乎中庸何也先生曰大學垂世立教之大典通為天下後世而言者也論孟應機接物之微言或因一時一事而發者也是以大學之規模雖大然其首尾該備而綱領可尋節目分明而工夫有序無非切於學者之日用論孟之為人雖切然而問者非一人記者非一端或前後淺深之無序或抑揚進退之不齊其間蓋有非初學日用之所及者此程子所以先大學而後論孟蓋以其難易緩急言之而非以聖人之言為有優劣也至於中庸則又聖門𫝊授極致之言尤非後學之所易得而聞者故程子之書未遽及之豈不又以為論孟既通然後可以及此乎蓋不先乎大學無以提挈綱領而盡論孟之精微不參之論孟無以融貫㑹通而極中庸之歸趣然不㑹其極於中庸則又何以建立大本經綸大經而讀天下之書論天下之事哉以是觀之則務講學者固不可不急於四書而讀四書者又不可不先於大學亦已明矣今之教者乃或棄此不務而反以他說先焉其不溺於虛空流於功利而得罪於聖門者幾希矣先生跋臨漳四經四書易書詩春秋大學論語孟子中庸有曰聖人作經以詔後世將使讀者誦其文思其義有以知事理之當然見道義之全體而身體力行之以入聖賢之域也其言雖約而天下之故幽明巨細靡不該焉欲求道以入德者舍是無所用其心矣然去聖既逺講誦失𫝊自其象數名物訓詁凡例之間老師宿儒尚有不能知者况於初學小生驟而語之是亦安能遽有以得其大指要歸也哉故河南程夫子之教人必先使之用力於大學論語中庸孟子之書然後及乎六經蓋其難易逺近大小之序固如此而不可亂也故今刻四古經而遂及乎四書者以先後之文悉著凡程子之言及於此者附於其後以見讀之之法學者得以觀覽焉抑嘗妄謂中庸雖七篇之所自出然讀者不先於孟子而遽及之則亦非所以為入道之漸也因竊并記於此云大學是為學綱目先通大學立定綱領其他經書雜放在裏今人讀書且從易解處去讀如大學中庸論孟四書道理粲然人只是不去看若理㑹得此四書何書不可讀何理不可究何事不可處也看文字且要看其平易正當處孔子教人句句是朴實頭張元德問春秋周禮疑難先生曰此等皆無證佐彊說不得若穿鑿出來便侮聖言不如且研窮義理義理明則皆可通矣因曰看文字且先看明白易曉者此語是某發出來諸公可記取人自有合讀底書如大學語孟中庸讀此便知人不可不學底道理與為學之次第然後更看詩書禮樂某才見人說看易便知他錯了未嘗知為學之序易自别是箇道理不是教人底書故記中只說先王崇四術順詩書禮樂以造士不說易也論語中亦不說左𫝊國語方說然亦是卜筮耳蓋易本為卜筮作熹嘗語學者欲看易時且將孔子所作十翼分明易曉者看如文言中元者善之長之類如中孚九二鳴鶴在陰其子和之亦不必理㑹鶴如何在陰其子又如何和且將繫辭中所說言行處看此雖是淺然却不差了蓋為學只要理㑹自己胸中事耳熹嘗謂上古之書莫尊於易中古後書莫大於春秋此兩書皆未易看今人才理㑹便入於鑿若要讀此二書且理㑹他大義易則是箇尊陽抑陰進君子退小人明消息盈虛之道春秋則是箇尊王賤霸內中國外夷狄明君臣上下之分學禮之意甚善然此事頭緒多恐精力短包羅不得今且讀詩俟所編書成讀之未晚書雖讀了亦更宜溫習如大學語孟中庸則須循環不住溫習令其爛熟春秋從前不敢容易令學者看今恐不可斷讀正經且讀三𫝊當看史工夫未可便穿鑿說褒貶道理久之却別商量亦是一事也按文集此條係答潘子善書先生書謂黃直卿曰春秋難看尤非病後所宜且讀他經論孟之屬如不食馬肝未為不知味也食馬肝出漢書儒林𫝊名數制度之類略知之便得不必大假深泥以妨學問先生答梁文叔書曰略於制度之說不知謂何往往都是考得繁碎非學者所先或是從來剖判不得如論語道千乘之國注家自是兩說此等如何强通况又捨去所急義理而從事於此縱得其說亦何用乎昨有問看史之法某告之當且治經求聖賢修己治人之要然後可以求此想見𫝊聞又說不教人看史矣先生答趙佐卿書曰大抵聖經惟論孟文詞平易而切於日用讀之疑少而益多若易春秋則尤為隱奧而難知者是以平日畏之而不敢輕讀也今人讀書未多義理未至融㑹便去看史考古今治亂理㑹制度典章譬如作陂塘以溉田須是陂塘中水已滿然後決之則可以流注滋植田中禾稼若是陂塘中水方有一勺之多遽決之以灌田則非徒無益於田而一勺之水亦無矣讀書既多融㑹胸中尺度已分明而不看史考古今治亂理㑹制度典章則是陂塘之水已滿矣而不決以溉田也看史先看史記及左氏却看西漢東漢及三國志次看通鑑通鑑却是連記去一事只一處說別無互見散在編年雖是大事其初却小後來漸漸做得大故人初看時不曾著精神只管看後却記不得不若先草草看正史一過正史各有傳可見始末又有他𫝊可互考所以易記每看一代正史記却去看通鑑先生答陳福公書曰伊洛文字亦多恐難遍覽只前此所禀近思録乃其要領只此一書尚恐理㑹未徹不在多看也右羣書先後緩急之序先生答滕德粹兄弟書曰足下於其所欲去者既未能脫然於胸中所欲就者又雜然並進而不無貪多欲速之意是以雖知其然而未免於茫然無得之歎耳足下誠若有志則願暫置於彼而致精於此取其一書自首而尾目之所玩不使過一二章心念躬行若不知復有他書者如是終篇而後更受業焉則漸涵之久心定理明而將有以自得矣論語之書乃是聖門親切之訓程氏之所以教尤以為先足下不以愚言為不信則願就此書始先生答吳伯豐書曰且如看大學如都不知有他書相似逐字逐句一一推窮逐章反覆通看本章血脉全篇反覆通看一篇次第終而復始令其通貫浹洽顛倒爛熟無可看得方可別看一書今方看得一句大學便已說向中庸上去如此支離蔓衍彼此迷暗互相連纍非惟不曉大學亦無功力別可看中庸矣又曰論孟中庸儘待大學通貫浹洽無可得看後方看乃佳若奔程趂限一向䟎看了則雖看猶不看也近方覺此病痛不是小事元來道學不明不是上面缺却工夫乃是下面元無根腳若信得及早腳踏實地如此做去良心自然不放踐履自然純熟非但讀書一事也政如農功如農之有畔為學亦然理㑹經不可躐等不可草率徒費心力須依次序理㑹得一經通熟他書亦易看凡讀一件便要精這一件一件看得精其他書亦易看嘗愛山谷與李幾仲帖說讀書法甚好云大率學者喜博而嘗病不精泛濫諸書不若精熟於一也有餘力然後及諸書則涉獵諸篇亦得其精蓋以我觀書則處處得益以書博我則釋卷而茫然讀書須是一件一件讀理㑹了一件方可換一件理㑹得通徹是當了則終此生更不用再理㑹後面只須把出來溫尋涵泳便了若不與逐件理㑹則雖讀到老依舊生正如喫飯不成一日都要喫得盡須與分做三頓喫只怎地頓頓喫去知一生喫了多少飯讀書亦如此讀書須純一如看一般未了又要涉獵一般都不濟事某向時讀書方其讀上句則不知有下句方其讀上章則不知有下章一日之間祗讀一二章凡讀書到冷淡無味處尤當著力精考文字且子細逐件理㑹得看多自有箇見處一之曰易簡且要知盡許多疑了方可下手做去先生曰若要知了如何便知得了不如且聽知得一件做一件知得兩件做兩件貪多不得今之學者大抵有貪多之病如此用工夫恐怕枉費了時日熹謂少看者功却多泛然多看全然無益熹深知此病初來只是一箇小沒理㑹少間却成一箇大沒理㑹去又曰文字不可泛看須逐句逐假理㑹理㑹此一假未透又去看別假皆成鶻突去如何㑹做徹如何㑹通貫今有看文字一覽而盡者亦恐只是無究竟問經書須逐句理㑹史書易曉只看大綱如何曰固不同然亦自是草率不得須當看人物是如何當時治體是如何皆當子細上蔡說明道看史逐行看過不蹉一字先生語陳公直曰讀書須逐些子子細理㑹莫要攪動他別底今人讀書多是從頭看到尾都攪渾了須是緊著工夫不可悠悠又不須忙只常提撕待心醒則愈有力讀書須是不可枝蔓如讀孟子其間引援詩書處甚多今雖欲檢本文但也只須看一假便依舊自看本來章句庶幾此心純一道夫曰此非特為讀書之方亦存心養性之要法也看經書之法看論語如無孟子看上章如無下章看學而時習之不須看有朋自逺方來且専看此一意得之而後已又如理㑹此句未得更不須雜以別相似者次第亂了和此句也曉不得又云讀論語如無孟子讀前假如無後假不然方讀此又思彼擾擾於中這般人不惟無得於書胸中如此作事全不得讀書須是専一讀這一句且理㑹這一句讀這一章且理㑹這一章須是見得此一章徹了方可看別章未要思量別章別句只是平心定氣在這裏看適因洗浴得一說大抵揩浴須從頭揩去則用力省而垢可去若於此處揩幾揩於彼處揩幾揩則勞而無功學問亦然若一畨理㑹不了又欲更作一畨理㑹終不濟事也莫道見了便休而今看一千遍見得又別看一萬遍見得又別須是無這册子時許多節目次第都厯厯落落在自家肚裏方好在經筵時曾說讀書者譬如觀此屋若在外而望之便謂見了則無緣識得須是入去裏面逐一看過是幾多間架幾多窗櫺看一遍了又重看一遍都說得方是讀書如園夫灌園善灌者隨其蔬果根株而灌之灌溉既足則泥水相和而物得其潤自然生長不善灌者忙而治之擔一擔之水澆滿園之蔬人見其治園矣而物未嘗沾足也先生問林共父看論語至何處對曰至述而先生曰莫恁地快這箇使急不得須是緩緩去理㑹須是逐句去搜索俟這一章透徹之後却理㑹第二章久後看得到貫通時却自然事事㑹看如喫飯樣了一日又却喫一日喫得滋味後方解生精血若只是恁地吞下去則不濟事先生問子武看詩到何處對曰至大雅先生大聲曰公前日方看節南山恁地快恁地不得今人看文字敏底一揭開板便曉但於意味恐不㑹得而今但只管看時也只恁地但百遍自是强五十遍時二百遍自是强一百遍時題彼脊令載飛載鳴我日斯邁而月斯征夙興夜寐無忝爾所生這箇看時也只是恁地但裏面却有記不得底解不得底意思事在說不得底意思裏面又曰生民等詩也見祭祀次第此與儀禮相合看文字不可傷快恐不子細須是理㑹得底更須將來看此不厭熟熟後更看方始覺其滋味出先生答侯官丞書曰示諭讀書之目恐亦太多姑以應課程可矣欲其從容玩味理與神㑹則恐決不能也又答書曰程氏教人以論孟大學中庸為本須於此數書熟讀詳味有㑹心處方自見得如其未然讀之不厭熟講之不厭煩此數書程氏與其門人髙弟為說甚詳試訪求之自首至尾循序加工須如小兒授書節節而進乃佳不可匆匆翻閲無補於事又不可雜以他說徒亂宗㫖也讀書是格物一事今且須逐段子細玩味人讀書不可攙前去下梢必無所得讀書如理亂髮然理髮須逐條理教條直讀書者須逐句逐字理㑹教通透先生讀書屏山書堂一日與諸生同行登臺見草盛長命數兵士耘草分作四段各耘一角有一兵士逐根拔去耘得甚不多其他所耘處一齊了畢先生見耘未了者問諸生曰諸公看幾箇耘草那箇快諸生言諸兵皆快獨指此人以為鈍先生曰不然某看來此卒獨快因細視諸兵所耘處草皆去不盡悉復呼來再耘先生復曰那一兵雖不甚快看他甚子細逐根去令盡雖一時之難然却是一畨工夫便了這箇又著從頭用工夫只緣其初欲速茍簡故致得費力如此看這處便是學者讀書之法右每書誦讀考索之序熟讀精思問看先生所解文字略通大義只是意味不如此浹洽先生云只要熟看又云且將正本文字熟看自然意義日生有所不解因而記録他日却有反覆論語愈看愈見得滋味出若欲草草看去儘說得通恐未能有益凡看文字須看古人下字意思是如何且如前輩作文一篇中須看他意在那裏子美詩云更覺良工心獨苦一般人看畫只見是畫一般識底人看便見他精神好處知得他用心也向時不理㑹得孟子以其章長故也因如此讀元來他章雖長意味却自首末相貫熟讀滋味自出今學者看文字往往不曽熟何緣貫通橫渠云書須成誦精神都是夜中或靜坐得之不記則思不起時舉云某緣資質魯鈍全記不起先生曰只是貪多故記不得福州陳晋之極魯鈍讀書只五十字必三百遍而後能熟積纍讀去後來却應賢良要之人只是不㑹耐苦耳凡學者要須是做得人難做底方好若見做不得便不去做任其自然何緣做得事成切宜勉之問讀書求意義雖知爛熟之為美而習氣已慣惟恐不多之念未能頓忘先生曰既知其非便當改之不須更加支蔓又曰荀子說誦數以貫之見得古人誦書亦記遍數貫字訓熟如習貫如自然又訓通誦得熟方能得通曉若不熟亦無可思索熟讀下同凡讀書且要熟讀不可只管思口中讀則心中閒而義理自出某之始學亦如是爾更無别法又曰讀得通貫後義理自出凡看文字端坐熟讀久之於大字邉自有細字迸出來方是自家見得若自家果是著心見他道理不得則聖賢為欺我矣而今公們只於外面捉摸箇影子說將去這箇不喚做學聖人之言熟讀玩味道理自見說了又喟然歎曰是有這箇道理說與人不信奈何或問吾與回言一章先生曰便是許多緊要底言語都不㑹說得且說精義有許多言語而集注能有幾多字是一字當百十字公都把作等間看了聖人言語本自明白不須解說只為學者看不見所以做出注解解尚看不出如何看得聖人意出聖人言語只熟讀玩味自不難見若果曽著心而看他道理不出則聖賢為欺我矣且如老蘇輩只讀孟子韓子便翻得許多文字出來譬如攻城四面牢壯任是銅墻鐵壁如今但只消攻得他一面破時則這城便是自家底了自然不待更去攻那三面矣又曰初學固是要先看大學語孟若先看得大學一書透徹他書都不費力觸類便見與張元德書曰舊與朋友說話每怪其不解人意而不知所以然者近乃覺學者讀了書聼了話後元不曽著心記當紬繹玩味至有兩年看一部易𫝊都不記得緊要處者雖其根鈍使然亦是不肯用力乃知橫渠教人讀書必欲成誦真學道者第一義須是如此已上方有著力處也又曰近與學者講論尤覺橫渠成誦之說是為徑捷蓋未論義理如何且是收得此心有歸處不至走作然亦須是精専精研使一書通透爛熟都無記不得處方别換一書乃為有益若但輪流通念而核之不精則亦未免枉費工夫也須是都通透後又却如此溫習乃為佳耳歐嚴談君近來看得又如何更望以此相勉但於所讀書經之注腳記得首尾貫通浹洽乃有玩味思繹處如其不然泛觀雜說毫無精實工夫則徒費日月終歸無益也又曰書只是熟讀常常記在心頭始得孔子教人也是學而時習之若不去時習則人都不奈何這是孔子弟子編集只把這箇作第一件若能時習將次自曉得若十分難曉底也自曉得讀書須是成誦方精熟今所以記不得說不去心下若存若亡皆是不精不熟之患若曉得義理又皆記得固是好若曉文義不得只背得少間不知不覺自然相觸發曉得這道理蓋這一段文義橫在心下自然放不得必曉而後己若曉不得又記不得更不消讀書矣橫渠云讀書須是成誦云今人所以不及古人處只爭這些子古人記得故曉得今人鹵莽記不得故曉不得不論緊急處皆須成誦自然曉得也今學者若已曉得大義但有一兩處阻礙說不去某這裏略似數句撥動自然曉得諸公盡不曽曉得縱某多說何益無他只要熟讀而已别無方法也先生答吳伯豐書曰此間亦有十數朋友往來講學前此多是看得文字不子細往往都不曽入心記得所以不見曲折意味久之遂至一時忘却今不免且熟看若得一一記得牢固分明則反覆誦數之間已粗得其意味矣又書曰此亦有十數朋友然極少得善看文字者不免令熟看注解以通念為先而徐思其義只尋正意毋得支蔓似此方略有頭緒然却恐變秀才為學究又不濟事耳因言讀書用功之難諸公覺大段淺近不曽著心某舊時用心甚苦思量這道理如遇危木橋子相去只在毫髮才失腳便跌落橋下用心極苦五十嵗後覺得心力短看見道理只爭毫髮間只是心力也不上所以大學語孟皆是五十嵗以前做得了自後長進甚不多而今人看文字全心粗前輩文士亦用幾多工夫方做得成若用之道理上那裏得來如韓文公答李翊一書與老蘇上歐陽書直如此用工夫未有茍然而成者歐陽則就作文上改換只管揩摩逐旋捱將去久久漸漸揩摩得光老蘇直是心中都透熟了方出之書看他所用工夫更難前輩以至敏之才而做至鈍工夫今人以至鈍之才而欲為至敏之工夫所以程子曰參也竟以魯得之精思下同看文字須入裏面猛滚一畨要透徹方能得脫離若只略略地看過恐終久不能得脫離此心又自不能放下也凡看文字初看時心尚走作道理尚見得未定到看定後方入規矩須是反覆玩味得熟便方是活受用不盡看文字正如酷吏之用法深刻都沒人情直要做到底若只恁地等間看過了有甚滋味又曰某嘗說看文字須似法家深刻方窮究得盡某直是拌得下工去大凡看文字若有曉不得處須著下死工夫直要見得道理是自家底方住先生言此以告學者其辭甚厲看文字如捉賊須於盜發處自一文以上贓罪情節都要勘出莫只描摸箇大綱縱使知道此人是賊却不知他在何處做賊亦不得讀時要體認得親切解時别白得分曉如此讀書方為有益大率吾曹之病皆有淺急處於道理上才有一說似打得過便謂之打得過以故為說不難而造理日淺今方欲痛自懲革看道理若只恁他說過一遍便了則都不濟事須是常常把來思量始得看過了後無時無候又把起來思量一遍十分思量不透又且放下待意思好時又把起來看恁地將久自然透徹延平先生嘗言道理須是日中理㑹夜裏却去靜處坐底思量方始有得某依此說去做真箇不同為學讀書須是耐煩細意去理㑹切不可粗心若曰自有箇捷徑法便是誤人底深坑也未見得道理時似數重物包褁在裏許無緣可以便見須是今日去了一重又見得一重明日又去了一重又見得一重去盡皮方見肉去盡肉方見骨去盡骨方見髓使粗心大氣不得吳伯英講書先生因曰凡人讀書須虛心入裏玩味道理不可只說得皮膚上讀書始讀未知有疑其次則漸漸有疑中則節節是疑過了這一畨疑漸漸釋以至融貫㑹通都無可疑方始是學又云大疑則大進又云無疑者須要有疑有疑者却要無疑關了門閉了户把斷了四路頭此正讀書時也羣疑並興寢食俱廢始劃然而有見也若有疑處且須自去商量不要倚靠人人若除得箇倚靠人底心學也須㑹進有疑須當識以俟問然不可不時時提起間看倘或相值殊勝問而後通也凡人讀書若窮得到通透處心中也潜地快活若疑處須是參諸家解熟看看得又差互時此一段終是不穩在心頭不要放過讀書須痛下工夫須要細看心粗性急終不濟事如看論語且將諸家相比並看自然比得正道理出來如識髙者初見一條便能判其是非如未能且細看如看欵案相似雖未能便判他案然已是經心盡知其情矣只管如此將來粗急之心亦磨礲得細密了橫渠云文要密察心要宏放若不痛做工夫終是難入看得一件是未可便以為是且頓放一所又窮他語相次看得多相比並自然透得且如聖賢千言萬語雖不同都只是說這道理且將聖賢說底看一句如此說一句如彼說逐句把來凑看次第合得都是這道理凡看文字諸家說有異同最可觀謂如甲說如此且撏扯住甲窮盡其辭乙說如此且撏扯住乙窮盡其辭兩家之說既盡又參考而窮究之必有一真是者出矣凡看文字諸家說有異同處最可觀某舊來看文字専看異同處如謝上蔡之說如彼楊龜山之說如此何者為得何者為失所以為得者是如何所以為失者是如何讀論語須將精義看先看一段看第二段將兩段比較孰得孰失孰是孰非又將第三段比較如前又總一章之說而盡比較之其間須有一家說合聖人之意或有兩說有三說有四五說皆是又就其中比較疏密如此便是格物及看得此一章透徹則知便至或自未有見識只得就這裏挨一章之中程子之說本是門人之說多失然初看時不可先萌此心門人所說亦多有好處蜚卿因言若只將程子之說為主如何曰不可只得以理為主然後看他底得一章直是透徹了然後看第二章亦如此法若只看得三四篇此心便熟數篇之後迎刃而解矣嘗苦與學者言說得口破少有依某去著力做工夫者且如格物致知之章程子與門人之說其初讀之皆不敢疑後來編出細看見得程子諸說雖不同意未嘗不貫其門人之說與先生之說則有大不同者矣文字大題目痛理㑹三五處後當迎刃而解此義理儘廣大無窮須是把來橫看直看子細窮究又云道理在人如何看直看是一般橫看又是一般又曰凡看文字不可落於偏僻須是周匝四通八逹無些窒礙方有進益又云觀書不可只觀緊要處間慢處却要周匝看文字專看細密而遺却緩急之間固不可専看緩急之間而遺却細密亦不可須是切己用工將來自得之於心則視言語誠如糟粕矣然今不可便視為糟粕也但當自期向到彼田地耳又云看文字専看四邉而遺却緊要處固不可専看緊要而遺却四邉亦不可看集注不可遺了緊要字蓋中有極散緩者有緩急之間者有極緊要者某釋經時每下一字直是稱輕等重然後寫出黃勉齊著論語通釋至吾之於人也誰毁誰譽章而曰先師之用意於集注一書愚嘗親見之一字未安一語未順覃思靜慮更易不置或一二日而未已夜坐或至三四更如此章乃親見其更改之勞對坐至四鼓先生曰此心已孤且休矣退而就寢目未交睫復見遣小吏持版牌改數字以見示則是退而未寐也未幾而天明矣用心之苦如此而學者顧以易心讀之安能得聖賢之意哉追念往事著之於此以為世戒學者觀書先須讀得正文記得注解成誦精熟注中訓釋文意事物名件發明經㫖相穿紐處一一認得如自己做出來底一般方能玩味反覆向上有通透處若不如此只是虛設議論如舉業一般非為己之學也曽見有人說詩問關睢篇於其訓詁名物全未曉便說樂而不淫哀而不傷某因說與他道公而今說詩只消這八字更添思無邪三字共成十一字便是一部毛詩了其他三百篇皆成渣滓矣因憶頃年汪端明說沈元用問和靖伊川易𫝊何處是切要尹云體用一源顯微無間此是切要處後舉似李先生先生曰尹說得好然須是看得六十四卦三百八十四爻都有下落方始說得此話若學者未曽子細理㑹便與他如此說却是誤他豫聞之悚然始知前日空言無實不濟事自此讀書益加詳細此一段先生親書示書堂學者或云而今每日只優游和緩曰而今便說優游和緩只是泛泛而已這箇工夫須是從大火中煆鍊教他通紅鎔成汁㵼成鋌方得只今是火面上炮熟全然生硬不屬自家使在濟得甚事須是縱橫舒卷皆由自家搦成團捺成匾放得去收得來方可某嘗思之今之學者所以多不得力正緣不熟耳吕居仁記老蘇說平日因聞升裏轉斗裏量遂悟作文處這箇須是爛泥熟之縱橫妙用皆由自家方濟得事也精熟下同學者看文字不必自立說只記得前賢與諸家說便得而今看自家如何終是不如前賢須是盡意記得諸家說方有箇襯簟處這裏義理根腳方牢這心也有殺泊處心終只在這上走久久自然曉得透熟今公輩看是大槩都有箇生之病所以說得來不透徹只欲去包籠巴攬他無實見處某舊看文字極難諸家說盡用記且如毛詩那時未似如今說得如此條暢古今諸家說盡用記取間時將起思量這一家說得那字是那字不是那一家說得那字是那字不是那家說得全是那家說得全非所以是者是如何所以非者是如何只管思量少間這正當道理自然光明燦爛存心目間如指諸掌公輩只是扭捻巴攬來說都不曽熟所以這道理收拾他不住自家也使他不動他也不伏自家使相聚得一朝半日便散去了只是不熟這箇道理古今聖賢也如此說做得大槩一般然今人說終是不似所爭熟不熟耳縱使說得十分全似猶不自在况和那十分似底也不曽看得出劉晏見錢流地上想見得熟了如此某而今看聖賢說話見聖人之心成片從面前過讀書之道用力愈多收功愈逺先難而後獲先事而後得皆是此理讀書須得箇說處方進看文字須要得言外之意便是看義理難又要寬著心又要緊著心不寬不足以見其規模之大不緊不足以見其文理之細密荀楊曉文義又不見他大規模處看書非止看一處便見道理如服藥相似一服豈能得病便好須服了又服服之多後藥力自行聖人之言大小精粗無有缺闕又曰聖人之言自是精粗輕重得宜
